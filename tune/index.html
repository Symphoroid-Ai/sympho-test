<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Comfortaa', 'Helvetica Neue', 'Segoe UI', sans-serif;
      background-color:  #0d1b2a;
      color: white;
    }
    header, section {
      padding: 2em;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
    }
    #langToggle {
      position: absolute;
      top: 1rem;
      right: 1rem; 
      background: #00bcd4;
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      padding: 0.5rem 1rem;
      z-index: 10;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn {
      background: #00bcd4;
      border: none;
      padding: 0.8em 1.5em;
      margin: 0.5em;
      color: white;
      border: 1px solid white;      
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease, color 0.2s ease;
      position: relative;
      z-index: 1;
    }
    .btn:active{
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
    }
    .btn.pop {
      animation: popGlow 0.25s ease forwards;
    }
    @keyframes popGlow {
      0% { transform: scale(1); box-shadow:0 0 0 rgba(255,255,255,0); background-color: inherit; color: inherit; }
      30% { transform: scale(1.3); box-shadow: 0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(0,188,212,0.5); }
      60% { transform: scale(1.1); box-shadow:0 0 15px rgba(255,255,255,0.6),0 0 30px rgba(0,188,212,0.4); background-color: #00e0ff; color: #fff;}
      100% { transform: scale(1); box-shadow:0 0 0 rgba(255,255,255,0); background-color:#00bcd4; color:white; }
    }
    iframe { display: block; border: none; }
    #videoArea_loop { position: relative; display: flex; justify-content: center; align-items: center; flex-direction: column; }
    section h2 { font-size: clamp(1rem, 5vw, 1.5rem); margin-bottom: 20px; }
    .section-button { padding: 12px 25px; font-weight: bold; color: white; background-color: #FF0000; text-decoration: none; border-radius: 6px; }
    header { background-color: #EAEEF6; color: #01BEE3; }
    .sns-links a { color: #7FDBFF; text-decoration: none; font-size: 32px; margin: 0 10px; }
    .sns-links a:hover { color: #00bcd4; }
    .footer-links { margin: 0 5px; text-decoration: none; color: inherit; font-size: 0.9rem; }
    .footer-links:hover { text-decoration: underline; }
    footer { text-align: center; padding: 20px; }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    /* シンプルタイマー（レイアウトは保持） - font-size は JS が上書きします */
    #timerDisplay {
      position: absolute;
      /* font-size を CSS だけに頼らない（JSで動画高さ基準に設定） */
      color: #ffffff;
      z-index: 10;
      pointer-events: none;
      text-shadow:0 0 10px rgba(200,230,255,0.9),0 0 18px rgba(120,180,255,0.6);
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.35em 0.7em;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 30px rgba(135,206,250,0.35),
        0 6px 25px rgba(0,0,0,0.45);
      /* 中央表示時の transform は class .center で付与 */
    }

    header img, .responsive-img { max-width:600px; width:80%; height:auto; display:block; margin:0 auto; }
    .top-left { top: 10px; left: 10px; }
    .top-right { top: 10px; right: 10px; }
    .bottom-left { bottom: 10px; left: 10px; }
    .bottom-right { bottom: 10px; right: 10px; }
    .center { top: 50%; left: 50%; transform: translate(-50%,-50%); }
    .simple-center { top:50%; left:50%; transform:translate(-50%,-50%);}
    .loop-controls, .upper-controls, .lower-controls, .btn-group { display:flex; flex-direction:column; align-items:center; gap:0.5em; justify-content:center; }
    .lower-controls { flex-direction:row; margin-top:1em; }
    #videoArea_choice { scroll-margin-top:80px; }
    .video-wrapper { position: relative; width:100%; max-width:800px; padding-bottom:56.25%; margin:auto; height:0; overflow:hidden; scroll-margin-top:80px; }
    .video-wrapper.empty { padding-bottom:0; height:0; min-height:0; margin:0; }
    .time-input { display:flex; align-items:center; gap:0.5em; }
    .time-input input { padding:0.5em; width:100px; }

    /* ---------------- 円形タイマー ---------------- */
    .circular-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      height: auto;
      width: 50%;        /* ベース値（JSで上書き可能） */
      max-width: 1000px;  /* 最大サイズ（保険） */
      transform: translate(-50%, -50%);
 
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 15;
    }

    #circularTimer {
      position: absolute;
      width: 100%;
      height: auto;
      pointer-events: none;
      display: none;
    }

    .circular-timer svg {
      width: 50%;
      height: auto;
      max-width: 1000px;
      overflow: visible;
      display: block;
      transform: rotate(-90deg);
    }

    .circular-timer circle {
      fill: none;
      stroke-linecap: round;
    }

    .circular-timer .bg {
      stroke: rgba(255,255,255,0.5); /* 濃くして目立たせる */
    }

    .circular-timer .progress {
      stroke: #ff0000;
      transition: stroke-dashoffset 0.1s linear;
      transform-origin: 50% 50%;
    }

    .circular-timer svg text {
      font-size: 2.5em;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      transform: rotate(90deg)
      text-shadow: 0 0 6px rgba(0,0,0,0.6), 0 0 12px rgba(255,255,255,0.3);
    }

<div class="upper-controls">

<label style="margin-top:10px;">

</label>

<div id="phaseDisplay" style="margin-top:10px; font-size:1.1em;"></div> 
  <div class="btn-group">
    <button class="btn" onclick="loadVideo()" data-jp="動画とタイマーをセット" data-en="Set Video & Timer"></button>

    <button class="btn" onclick="toggleTimerType()" id="timerTypeBtn" data-jp="シンプルタイマー" data-en="Simple Timer"></button>

<script>

let ytPlayer, timerInterval;

let pomodoroMode = false;
let currentPhase = "focus";
let focusDuration = 0;
let breakDuration = 0;

let remainingTime = 0;
let isPaused = false, isPlaying = false;
let playerReady = false;
let isCircular = false; // 追加：円形タイマーの初期状態

const positions = ["top-left", "top-right", "bottom-left", "bottom-right", "center"];
let positionIndex = 0;

let currentLang = localStorage.getItem('lang') || 'jp'; // ← localStorageから読み込み
let moodVideos = {}; // fetch後に埋まる

document.addEventListener("DOMContentLoaded", () => {
  // 保存されていた時間を復元
  const saved = localStorage.getItem("savedDuration");
  if (saved) {
    document.getElementById("duration").value = saved;
  }

  // 言語処理
  updateLanguage();
  document.getElementById("langToggle").textContent = currentLang === 'jp' ? "English" : "日本語";
  checkYTApiReady();

  // 時間入力時に保存する
  document.getElementById("duration").addEventListener("input", function () {
    localStorage.setItem("savedDuration", this.value);
  });
});
  
document.getElementById("langToggle").addEventListener("click", () => {
  currentLang = currentLang === 'jp' ? 'en' : 'jp';
  localStorage.setItem('lang', currentLang); // ← 言語を保存
  updateLanguage();
  document.getElementById("langToggle").textContent = currentLang === 'jp' ? "English" : "日本語";
});

function updateLanguage() {
  document.querySelectorAll("[data-jp]").forEach(el => {
    if ('placeholder' in el) {
      el.placeholder = el.getAttribute(`data-${currentLang}`);
    } else {
      el.textContent = el.getAttribute(`data-${currentLang}`);
    }
  });
}

function showSection(section) {
  document.getElementById("choice").style.display = section === "choice" ? "block" : "none";
  document.getElementById("loop").style.display = section === "loop" ? "block" : "none";
  setTimeout(() => {
    document.getElementById(section).scrollIntoView({ behavior: "smooth" });
  }, 100);
}

// --- 位置切替（シンプルタイマーと円形タイマー分離） ---
function toggleTimerPosition(){
  positionIndex = (positionIndex+1)%positions.length;
  const posLabels = currentLang==='jp'?["左上","右上","左下","右下","中央"]:["Top-Left","Top-Right","Bottom-Left","Bottom-Right","Center"];

  const timerDisplay = document.getElementById("timerDisplay");
  // シンプルタイマーのみクラス変更
  if(!isCircular){
    timerDisplay.className = positions[positionIndex];
  }

  document.getElementById("positionBtn").textContent = (currentLang==='jp'?"表示位置：":"Position: ") + posLabels[positionIndex];

  // 円形タイマーには一切触れない
}


function toggleTimerType() {
  isCircular = !isCircular;
  const btn = document.getElementById("timerTypeBtn");
  btn.textContent = (isCircular ? (currentLang==='jp'?"体感タイマー":"Progress Circle") : (currentLang==='jp'?"シンプルタイマー":"Simple Timer"));

  const numericTimer = document.getElementById("timerDisplay");
  let circularTimer = document.getElementById("circularTimer"); // ← ここで毎回取得
  if(isCircular){
    numericTimer.style.display = "none";
    if(!circularTimer) {
      createCircularTimer();
      circularTimer = document.getElementById("circularTimer"); // ← 作成後に再取得
    }
    // Ensure circular timer uses current position class (so "center" works)
    circularTimer.className = "circular-timer " + positions[positionIndex];
    circularTimer.style.display = "flex";
    // initialize text immediately
    const circularText = document.getElementById("circularTimerText");
    if (circularText) {
      const mins = String(Math.floor(remainingTime / 60)).padStart(2, '0');
      const secs = String(remainingTime % 60).padStart(2, '0');
      circularText.textContent = `${mins}:${secs}`;
    }
    // make sure sizes match player
    adjustTimerSizes();
  } else {
    numericTimer.style.display = remainingTime>0 ? "block" : "none";
    if(circularTimer) circularTimer.style.display = "none";
  }
}

function createCircularTimer(){
  const wrapper = document.querySelector("#loop .video-wrapper");
  const div = document.createElement("div");
  div.id = "circularTimer";
  div.className = "circular-timer";

 div.innerHTML = `
  <svg viewBox="0 0 200 200">
    <circle class="bg" cx="100" cy="100" r="90"
        stroke="#ffffff33" stroke-width="15" fill="none" />
    <circle class="progress" cx="100" cy="100" r="90"
        stroke="#00eaff" stroke-width="15" fill="none"
        
        style="stroke-linecap: round; transition: stroke-dashoffset 0.1s linear;" />
    <text id="circularTimerText"
          x="50%" y="50%"
          text-anchor="middle"
          dominant-baseline="central"
          fill="white"
          font-size="42"
          transform="rotate(90 100 100)"
          style="text-shadow: 0 0 8px black;">
      00:00
    </text>
  </svg>
`;
  wrapper.appendChild(div);

  // circumference 計算
  const progress = div.querySelector('.progress');
  const r = parseFloat(progress.getAttribute('r')) || 90;
  const circ = 2 * Math.PI * r;
  progress.style.strokeDasharray = circ;
  progress.style.strokeDashoffset = circ;
  
  div.dataset.circumference = circ;
  div.dataset.r = r;

  // ensure initial stroke widths/appearance
  const bg = div.querySelector('.bg');
  if(bg) {
    bg.setAttribute('stroke-width', 15);
  }
  if(progress) {
    progress.setAttribute('stroke-width', 15);
  }

  // after creating, size it to video
  adjustTimerSizes();
}

function updateTimerDisplay(){
  if(isCircular){
    const circular = document.getElementById("circularTimer");
    if(!circular) return;
    const circle = circular.querySelector(".progress");
    const text = document.getElementById("circularTimerText");
    const total = parseInt(document.getElementById("duration").value,10)*60 || 1;
    const circ = parseFloat(circular.dataset.circumference) || parseFloat(circle.style.strokeDasharray) || 314;
    // progress as fraction (0..1) completed
    const progressFraction = (total - remainingTime) / total;
    // strokeDashoffset: circ when 0% completed, 0 when 100% completed
    const offset = Math.max(0, circ * (1 - progressFraction));
    circle.style.strokeDashoffset = offset;
    const mins = String(Math.floor(remainingTime/60)).padStart(2,'0');
    const secs = String(remainingTime%60).padStart(2,'0');
    if(text) text.textContent = `${mins}:${secs}`;
  } else {
    const timerDisplay = document.getElementById("timerDisplay");
    const mins = String(Math.floor(remainingTime/60)).padStart(2,'0');
    const secs = String(remainingTime%60).padStart(2,'0');
    timerDisplay.textContent = `${mins}:${secs}`;
  }
}
function updatePhaseDisplay() {

  const phaseDisplay = document.getElementById("phaseDisplay");

  if (!pomodoroMode) {
    phaseDisplay.textContent = "";
    return;
  }

  if (currentPhase === "focus") {

    phaseDisplay.textContent =
      currentLang === "jp"
        ? "🌌 集中時間"
        : "🌌 Focus Time";

  } else {

    phaseDisplay.textContent =
      currentLang === "jp"
        ? "☕ 休憩時間"
        : "☕ Break Time";
  }
}
// サイズ調整：動画エリアの高さを基準に円形とシンプルタイマーを合わせる
function adjustTimerSizes() {
  const wrapper = document.querySelector("#loop .video-wrapper");
  if(!wrapper) return;
  const rect = wrapper.getBoundingClientRect();
  const h = rect.height || (wrapper.clientHeight || 0);

  // 円形：動画高さの 60% を直径に（調整可）
  const circEl = document.getElementById("circularTimer");
  if(circEl) {
//    const size = Math.max(48, Math.min(h * 1.0, 0.95 * rect.width)); // 最小48px、最大は幅の90%を上限
    const size = h*1.8;
    circEl.style.width = size + "px";
    circEl.style.height = size + "px";

    // SVG内の文字サイズを動画に応じて調整（比率は好みで調整）
    const txt = circEl.querySelector('#circularTimerText');
    if(txt) {
      // font-size in SVG units: scale by size / viewBox(200)
      const fontPx = Math.round(size * 0.22); // 調整係数
      txt.setAttribute('font-size', fontPx);
    }

    // progress circle stroke width also can be scaled:
    const progress = circEl.querySelector('.progress');
    const bg = circEl.querySelector('.bg');
  //const stroke = Math.max(6, Math.round(size * 0.06)); // 6px min
    const stroke = 15;
    if(progress) progress.setAttribute('stroke-width', stroke);
    if(bg) bg.setAttribute('stroke-width', Math.max( stroke, stroke + 2 ));
    
    // recalc circumference (if r changed in logic we keep r constant=90 in viewBox; strokeDash uses r from SVG)
    const r = parseFloat(progress.getAttribute('r')) || 90;
    const circ = 2 * Math.PI * r;
    progress.style.strokeDasharray = circ;
    // Update dashoffset according to remainingTime if running
    if(typeof remainingTime === 'number') {
      const total = parseInt(document.getElementById("duration").value,10)*60 || 1;
      const progressFraction = (total - remainingTime) / total;
      progress.style.strokeDashoffset = Math.max(0, circ * (1 - progressFraction));
    }
  }

  // シンプルタイマー：動画高さの 12% をフォントサイズに
  const simple = document.getElementById("timerDisplay");
  if(simple) {
    const fontPx = Math.round(h * 0.12);
    simple.style.fontSize = Math.max(12, Math.min(fontPx, 0.25 * rect.width)) + "px"; // 最小12px, 最大は幅の25%
  }
}

// YouTube APIが既にロード済みかチェックし、playerReadyを設定
function checkYTApiReady() {
  if (window.YT && window.YT.Player) {
    playerReady = true;
    console.log("YouTube IFrame API is already loaded.");
  } else {
    setTimeout(checkYTApiReady, 200);
  }
}

// YouTube API読み込み完了時に必ず呼ばれるコールバック
window.onYouTubeIframeAPIReady = function() {
  playerReady = true;
  console.log("YouTube IFrame API ready (callback).");
  // If player exists, we might want to adjust sizes once it's ready
  setTimeout(adjustTimerSizes, 300);
};

function loadVideo() {
  console.log("=== loadVideo triggered ===");

  const url = document.getElementById("ytUrl").value;
  const videoId = url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]+)/)?.[1];
  if (!videoId) {
    alert(currentLang === 'jp' ? "正しいURLを入力してください。" : "Please enter a valid URL.");
    return;
  }

const minutesInput = document.getElementById("duration").value.trim();

// 数値かどうか、整数かどうか、1以上かどうかをすべてチェック
if (!/^\d+$/.test(minutesInput)) {
  alert(currentLang === 'jp'
    ? "タイマーには1分以上の整数を入力してください。"
    : "Please set the timer to an integer value of at least 1 minute.");
  return;
}

const minutes = parseInt(minutesInput, 10);
if (minutes <= 0) {
  alert(currentLang === 'jp'
    ? "タイマーには1分以上の整数を入力してください。"
    : "Please set the timer to an integer value of at least 1 minute.");
  return;
}
  
  // タイマー初期化
  remainingTime = minutes * 60;

  pomodoroMode = document.getElementById("pomodoroMode").checked;
  focusDuration = minutes * 60;
  const breakInput = parseInt(
    document.getElementById("breakDuration").value,
    10
  ) || 5;
  breakDuration = breakInput * 60;
  currentPhase = "focus";
  updatePhaseDisplay();

  clearInterval(timerInterval);
  isCounting = false;

  // タイマー表示の更新
  const timerDisplay = document.getElementById("timerDisplay");
  // タイマー表示の更新
if (isCircular) {
  // 数字タイマーは非表示
  timerDisplay.style.display = "none";

  // 円形タイマーを作成 or 表示
  let circularTimer = document.getElementById("circularTimer");
  if (!circularTimer) createCircularTimer();
  circularTimer = document.getElementById("circularTimer");
  // ensure it uses the current position class
  circularTimer.className = "circular-timer " + positions[positionIndex];
  circularTimer.style.display = "flex";

  // 円形タイマーのテキストを初期化
  const circularText = document.getElementById("circularTimerText");
  const mins = String(Math.floor(remainingTime / 60)).padStart(2, '0');
  const secs = String(remainingTime % 60).padStart(2, '0');
  if (circularText) circularText.textContent = `${mins}:${secs}`;

  // 円形タイマーのゲージもリセット (use stored circumference)
  const progressCircle = circularTimer.querySelector(".progress");
  const total = parseInt(document.getElementById("duration").value, 10) * 60 || 1;
  const circ = parseFloat(circularTimer.dataset.circumference) || 314;
  progressCircle.style.strokeDashoffset = circ * 1; // start at 0 progress
  progressCircle.style.strokeDasharray = circ;

  // サイズを合わせる
  adjustTimerSizes();

} else {
  // 数字タイマー
  timerDisplay.className = positions[positionIndex];
  timerDisplay.style.display = remainingTime > 0 ? "block" : "none";
  const mins = String(Math.floor(remainingTime / 60)).padStart(2,'0');
  const secs = String(remainingTime % 60).padStart(2,'0');
  timerDisplay.textContent = `${mins}:${secs}`;

  // サイズ合わせ（シンプルタイマー）
  adjustTimerSizes();
}

  const mins = Math.floor(remainingTime / 60);
  const secs = remainingTime % 60;
  timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

  // プレイヤー初期化 or cue 動画
  if (!ytPlayer && playerReady) {
    ytPlayer = new YT.Player('ytPlayer', {
      videoId,
      playerVars: { playsinline: 1, fs: 0 },
      events: {
        onReady: event => {
          event.target.unMute();
          event.target.cueVideoById(videoId);
          // プレイヤー高さが確定したらサイズ調整
          setTimeout(adjustTimerSizes, 300);
        },
        onStateChange: evt => {
          if (evt.data === YT.PlayerState.ENDED) {
            setTimeout(() => {
              if (ytPlayer && typeof ytPlayer.seekTo === 'function') {
                ytPlayer.seekTo(0, true);// 秒単位＋音声維持
                ytPlayer.unMute();  // ここに追加
                ytPlayer.playVideo();
              }
            }, 300); // 少し遅延させてオーディオ復帰を促す
          }
        }
      }
    });
  } else if (ytPlayer && playerReady) {
    ytPlayer.cueVideoById(videoId);
    // 動画切り替え後にサイズ更新
    setTimeout(adjustTimerSizes, 300);
  } else {
    console.log("YouTube Player not ready yet.");
  }

  isPaused = false;
  isPlaying = false;
  document.querySelector("#loop .video-wrapper").scrollIntoView({ behavior: "smooth" });  
}


function playLoop() {
  
  if (!ytPlayer || isPlaying) return;

  console.log("=== playLoop triggered ===");
  ytPlayer.unMute();
  ytPlayer.playVideo();

  startTimer(remainingTime || 0);
  isPaused = false;
}

function startTimer(totalTime) {
  if (isPlaying) return;
  isPlaying = true;
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    remainingTime--;
    if (remainingTime < 0) {
      // -------------------------
      // ポモドーロモード
      // -------------------------
      if (pomodoroMode) {
        if (currentPhase === "focus") {
          currentPhase = "break";
          remainingTime = breakDuration;
          ytPlayer?.pauseVideo();
        } 
        else {
          currentPhase = "focus";
          remainingTime = focusDuration;
          ytPlayer?.playVideo();
        }
        updatePhaseDisplay();
        updateTimerDisplay();
        return;
      }

      // -------------------------
      // 通常モード
      // -------------------------
      clearInterval(timerInterval);
      remainingTime = 0;
      updateTimerDisplay();
      ytPlayer?.stopVideo();
      isPlaying = false;
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function stopLoop() {
  ytPlayer?.pauseVideo();
  isPaused = true;
  isPlaying = false;
  
  currentPhase = "focus";
  pomodoroMode = false;
  document.getElementById("phaseDisplay").textContent = "";
  document.getElementById("pomodoroMode").checked = false;

  clearInterval(timerInterval);
}

function resetLoop() {
  ytPlayer?.destroy();
  ytPlayer = null;
  clearInterval(timerInterval);
  remainingTime = 0;
  isPaused = false;
  isPlaying = false;
  document.getElementById("ytUrl").value = "";
  document.getElementById("duration").value = "";
  document.getElementById("timerDisplay").textContent = "";
  document.getElementById("timerDisplay").style.display = "none";
  document.getElementById("ytPlayer").innerHTML = "";

  // hide and remove circular timer if present
  const circ = document.getElementById("circularTimer");
  if (circ) {
    circ.style.display = "none";
    circ.remove();
  }
  
}

function extractVideoId(url) {
  const match = url.match(/(?:youtu\.be\/|youtube\.com.*(?:v=|\/embed\/))([a-zA-Z0-9_-]+)/);
  return match ? match[1] : null;
}

function copyToLoop(url) {
  document.getElementById("ytUrl").value = url;
  showSection('loop');
  loadVideo();
}

function playRandomVideo(mood) {
  const urls = moodVideos[mood];
  if (!urls || urls.length === 0) {
    alert(currentLang === 'jp' ? "その気分の動画が見つかりません。" : "No videos found for that mood.");
    return;
  }
  const randomUrl = urls[Math.floor(Math.random() * urls.length)];
  const videoId = extractVideoId(randomUrl);
  if (!videoId) {
    alert(currentLang === 'jp' ? "無効な動画URLです。" : "Invalid video URL.");
    return;
  }
  const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1`;
  const resultArea = document.getElementById("videoArea_choice");

  resultArea.innerHTML = `<p data-jp="あなたにぴったりの音楽を占っています…" data-en="Fortune-telling your perfect music...">${currentLang === 'jp' ? "あなたにぴったりの音楽を占っています…" : "Fortune-telling your perfect music..."}</p>`;

  setTimeout(() => {
    resultArea.innerHTML = `

      <p data-jp="あなたの今日の音楽はこちら！" data-en="Your music for today is here!">${currentLang === 'jp' ? "あなたの今日の音楽はこちら！" : "Your music for today is here!"}</p>

        ${currentLang === 'jp' ? "この動画をSympho loopで使う" : "Use this video with Sympho loop"}
      </button>
    `;
    updateLanguage();
    document.getElementById("videoArea_choice").scrollIntoView({ behavior: "smooth" });
  }, 2000);
}
