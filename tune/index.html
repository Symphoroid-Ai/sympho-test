        color: inherit;

      30% {

  <!-- 言語切替スクリプト -->
<script>
  const langToggle = document.getElementById("langToggle");
  const langTexts = document.querySelectorAll(".lang-text");
  let currentLang = localStorage.getItem('lang') || "jp";

  function applyLang() {
    langToggle.textContent = langToggle.getAttribute(`data-${currentLang}`);
    langTexts.forEach(el => {
      el.textContent = el.getAttribute(`data-${currentLang}`);
    });
  }

  langToggle.addEventListener("click", () => {
    currentLang = currentLang === "jp" ? "en" : "jp";
    localStorage.setItem('lang', currentLang);
    applyLang();
  });

  applyLang();
</script>

<script>
const images = document.querySelectorAll('.bg-image');
let current = 0;
const interval = 5000; // 5秒
const fadeDuration = 2000; // 2秒フェード（CSSで設定済み）

// ページロード直後に最初の画像もズーム開始
window.addEventListener('load', () => {
  setTimeout(() => {
    images[current].style.transform = "scale(1.2)";
    images[current].classList.add('active');
  }, 50); // 少し遅延させる
});

// 画像切り替え
setInterval(() => {
  const prev = current;
  current = (current + 1) % images.length;

  // 新しい画像をactiveにしてフェードイン
  images[current].classList.add('active');
  setTimeout(() => {
    images[current].style.transform = "scale(1.1)";
  }, 50);

  // 前の画像はフェードアウトしつつズームリセット
  images[prev].style.opacity = 0;
  images[prev].style.transform = "scale(1)";

  // 完全に非表示にする（次回に備える）
  setTimeout(() => {
    images[prev].classList.remove('active');
    images[prev].style.opacity = "";
  }, 2000); // フェード時間に合わせる
}, interval);

// ---------------- すべてのボタンに豪華ポップエフェクトを追加 ----------------
document.querySelectorAll('.btn, .btnHW, #positionBtn, #langToggle').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.remove('pop'); // 念のため一度削除
    void btn.offsetWidth; // reflowでアニメーションをリセット
    btn.classList.add('pop');
  });
});


// ===============================
// Sympho tune への遷移を 0.25秒 遅延
// （A. ボタン形式、B. メニュー形式 どちらにも対応）
// ===============================
document.querySelectorAll('a[href="tune"], a[href="./tune"], a[href="/tune"]').forEach(link => {
  link.addEventListener("click", function(e) {
    e.preventDefault(); // すぐ画面が切り替わるのを止める

    const targetUrl = link.getAttribute("href");

    // ▼ ボタンタイプなら pop エフェクト付与
    if (link.classList.contains("btn")) {
      link.classList.remove("pop");
      void link.offsetWidth; // アニメリセット
      link.classList.add("pop");
    }

    // ▼ エフェクト終了後（0.25秒後）にページ遷移
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 250);
  });
});


</script>
