<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>sympho tune</title>

  <script src="https://www.youtube.com/iframe_api"></script>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: 'Comfortaa', 'Helvetica Neue', 'Segoe UI', sans-serif;
      background-color: #0d1b2a;
      color: white;
    }

    header, section {
      padding: 2em;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
    }

    #langToggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #00bcd4;
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      padding: 0.5rem 1rem;
      z-index: 10;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn {
      background: #00bcd4;
      border: none;
      padding: 0.8em 1.5em;
      margin: 0.5em;
      color: white;
      border: 1px solid white;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background-color 0.2s ease,
        color 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .btn:active {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .btn.pop {
      animation: popGlow 0.25s ease forwards;
    }

    @keyframes popGlow {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: inherit;
        color: inherit;
      }

      30% {
        transform: scale(1.3);
        box-shadow:
          0 0 20px rgba(255,255,255,0.8),
          0 0 40px rgba(0,188,212,0.5);
      }

      60% {
        transform: scale(1.1);
        box-shadow:
          0 0 15px rgba(255,255,255,0.6),
          0 0 30px rgba(0,188,212,0.4);
        background-color: #00e0ff;
        color: #fff;
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: #00bcd4;
        color: white;
      }
    }

    iframe {
      display: block;
      border: none;
    }

    section h2 {
      font-size: clamp(1rem, 5vw, 1.5rem);
      margin-bottom: 20px;
    }

    header {
      background-color: #EAEEF6;
      color: #01BEE3;
    }

    .sns-links a {
      color: #7FDBFF;
      text-decoration: none;
      font-size: 32px;
      margin: 0 10px;
    }

    .sns-links a:hover {
      color: #00bcd4;
    }

    .footer-links {
      margin: 0 5px;
      text-decoration: none;
      color: inherit;
      font-size: 0.9rem;
    }

    .footer-links:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding-bottom: 56.25%;
      margin: auto;
      height: 0;
      overflow: hidden;
      scroll-margin-top: 80px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #timerDisplay {
      position: absolute;
      color: #ffffff;
      z-index: 10;
      pointer-events: none;
      text-shadow:
        0 0 10px rgba(200,230,255,0.9),
        0 0 18px rgba(120,180,255,0.6);
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.35em 0.7em;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 30px rgba(135,206,250,0.35),
        0 6px 25px rgba(0,0,0,0.45);
    }

    header img,
    .responsive-img {
      max-width: 600px;
      width: 80%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .top-left {
      top: 10px;
      left: 10px;
    }

    .top-right {
      top: 10px;
      right: 10px;
    }

    .bottom-left {
      bottom: 10px;
      left: 10px;
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
    }

    .center {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .loop-controls,
    .upper-controls,
    .lower-controls,
    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
      justify-content: center;
    }

    .lower-controls {
      flex-direction: row;
      margin-top: 1em;
    }

    .time-input {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .time-input input {
      padding: 0.5em;
      width: 100px;
    }

    .circular-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50%;
      max-width: 1000px;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 15;
    }

    #circularTimer {
      position: absolute;
      width: 100%;
      height: auto;
      pointer-events: none;
      display: none;
    }

    .circular-timer svg {
      width: 50%;
      height: auto;
      max-width: 1000px;
      overflow: visible;
      display: block;
      transform: rotate(-90deg);
    }

    .circular-timer circle {
      fill: none;
      stroke-linecap: round;
    }

    .circular-timer .bg {
      stroke: rgba(255,255,255,0.5);
    }

    .circular-timer .progress {
      stroke: #ff0000;
      transition: stroke-dashoffset 0.1s linear;
      transform-origin: 50% 50%;
    }

    .circular-timer svg text {
      font-size: 2.5em;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      transform: rotate(90deg);
      text-shadow:
        0 0 6px rgba(0,0,0,0.6),
        0 0 12px rgba(255,255,255,0.3);
    }
  </style>

<header>

<!-- Sympho Loop -->
<section id="loop" style="display:none;">

  <p

<script>

const appState = {
  loop: {
    ytPlayer: null,
    timerInterval: null,
    remainingTime: 0,
    isPlaying: false,
    isPaused: false,
    isCircular: false,
    positionIndex: 0
  },

  focus: {
    ytPlayer: null,
    timerInterval: null,
    remainingTime: 0,
    isPlaying: false,
    isPaused: false,
    isCircular: false,
    positionIndex: 0
  }
};

const positions = [
  "top-left",
  "top-right",
  "bottom-left",
  "bottom-right",
  "center"
];

let playerReady = false;
let currentLang = localStorage.getItem('lang') || 'jp';
let moodVideos = {};

document.addEventListener("DOMContentLoaded", () => {

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp'
      ? "English"
      : "日本語";

  checkYTApiReady();
});

document.getElementById("langToggle").addEventListener("click", () => {

  currentLang = currentLang === 'jp'
    ? 'en'
    : 'jp';

  localStorage.setItem('lang', currentLang);

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp'
      ? "English"
      : "日本語";
});

function updateLanguage() {

  document.querySelectorAll("[data-jp]").forEach(el => {

    if ('placeholder' in el) {
      el.placeholder = el.getAttribute(`data-${currentLang}`);
    } else {
      el.textContent = el.getAttribute(`data-${currentLang}`);
    }
  });
}

function showSection(section) {

  document.getElementById("choice").style.display =
    section === "choice" ? "block" : "none";

  document.getElementById("loop").style.display =
    section === "loop" ? "block" : "none";

  document.getElementById("focus").style.display =
    section === "focus" ? "block" : "none";

  setTimeout(() => {
    document.getElementById(section)
      .scrollIntoView({ behavior: "smooth" });
  }, 100);
}

function checkYTApiReady() {

  if (window.YT && window.YT.Player) {
    playerReady = true;
  } else {
    setTimeout(checkYTApiReady, 200);
  }
}

window.onYouTubeIframeAPIReady = function () {
  playerReady = true;
};

function toggleTimerPosition(mode) {

  const state = appState[mode];

  state.positionIndex =
    (state.positionIndex + 1) % positions.length;

  const labels =
    currentLang === 'jp'
      ? ["左上","右上","左下","右下","中央"]
      : ["Top-Left","Top-Right","Bottom-Left","Bottom-Right","Center"];

  const timerDisplay =
    document.getElementById(`${mode}TimerDisplay`);

  if (!state.isCircular) {
    timerDisplay.className = positions[state.positionIndex];
  }

  document.getElementById(`${mode}PositionBtn`).textContent =
    (currentLang === 'jp'
      ? "表示位置："
      : "Position: ")
    + labels[state.positionIndex];
}

function toggleTimerType(mode) {

  const state = appState[mode];

  state.isCircular = !state.isCircular;

  const btn =
    document.getElementById(`${mode}TimerTypeBtn`);

  btn.textContent = state.isCircular
    ? (currentLang === 'jp'
      ? "体感タイマー"
      : "Progress Circle")
    : (currentLang === 'jp'
      ? "シンプルタイマー"
      : "Simple Timer");

  const timerDisplay =
    document.getElementById(`${mode}TimerDisplay`);

  let circular =
    document.getElementById(`${mode}CircularTimer`);

  if (state.isCircular) {

    timerDisplay.style.display = "none";

    if (!circular) {
      createCircularTimer(mode);
      circular =
        document.getElementById(`${mode}CircularTimer`);
    }

    circular.style.display = "flex";

  } else {

    timerDisplay.style.display =
      state.remainingTime > 0
        ? "block"
        : "none";

    if (circular) {
      circular.style.display = "none";
    }
  }
}

function createCircularTimer(mode) {

  const wrapper =
    document.querySelector(`#${mode} .video-wrapper`);

  const div = document.createElement("div");

  div.id = `${mode}CircularTimer`;
  div.className = "circular-timer";

  div.innerHTML = `
    <svg viewBox="0 0 200 200">
      <circle
        class="bg"
        cx="100"
        cy="100"
        r="90"
        stroke="#ffffff33"
        stroke-width="15"
        fill="none" />

      <circle
        class="progress"
        cx="100"
        cy="100"
        r="90"
        stroke="#00eaff"
        stroke-width="15"
        fill="none" />

      <text
        id="${mode}CircularTimerText"
        x="50%"
        y="50%"
        text-anchor="middle"
        dominant-baseline="central"
        fill="white"
        font-size="42"
        transform="rotate(90 100 100)">
        00:00
      </text>
    </svg>
  `;

  wrapper.appendChild(div);
}

function loadVideo(mode) {

  const state = appState[mode];

  const url =
    document.getElementById(`${mode}YtUrl`).value;

  const videoId =
    url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]+)/)?.[1];

  if (!videoId) {
    alert(
      currentLang === 'jp'
        ? "正しいURLを入力してください。"
        : "Please enter a valid URL."
    );
    return;
  }

  const durationId =
    mode === "loop"
      ? "loopDuration"
      : "focusDuration";

  const minutes =
    parseInt(
      document.getElementById(durationId).value,
      10
    ) || 10;

  state.remainingTime = minutes * 60;

  updateTimerDisplay(mode);

  if (!state.ytPlayer && playerReady) {

    state.ytPlayer = new YT.Player(`${mode}Player`, {

      videoId,

      playerVars: {
        playsinline: 1,
        fs: 0
      },

      events: {

        onReady: event => {
          event.target.unMute();
          event.target.cueVideoById(videoId);
        },

        onStateChange: evt => {

          if (evt.data === YT.PlayerState.ENDED) {

            setTimeout(() => {

              if (
                state.ytPlayer &&
                typeof state.ytPlayer.seekTo === 'function'
              ) {

                state.ytPlayer.seekTo(0, true);
                state.ytPlayer.unMute();
                state.ytPlayer.playVideo();
              }

            }, 300);
          }
        }
      }
    });

  } else if (state.ytPlayer) {

    state.ytPlayer.cueVideoById(videoId);
  }
}

function playLoop(mode) {

  const state = appState[mode];

  if (!state.ytPlayer || state.isPlaying) {
    return;
  }

  state.ytPlayer.unMute();
  state.ytPlayer.playVideo();

  startTimer(mode);
}

function startTimer(mode) {

  const state = appState[mode];

  if (state.isPlaying) return;

  state.isPlaying = true;

  clearInterval(state.timerInterval);

  updateTimerDisplay(mode);

  state.timerInterval = setInterval(() => {

    state.remainingTime--;

    if (state.remainingTime < 0) {

      clearInterval(state.timerInterval);

      state.remainingTime = 0;

      updateTimerDisplay(mode);

      state.ytPlayer?.stopVideo();

      state.isPlaying = false;

      return;
    }

    updateTimerDisplay(mode);

  }, 1000);
}

function updateTimerDisplay(mode) {

  const state = appState[mode];

  const mins =
    String(Math.floor(state.remainingTime / 60))
      .padStart(2, '0');

  const secs =
    String(state.remainingTime % 60)
      .padStart(2, '0');

  if (state.isCircular) {

    const text =
      document.getElementById(`${mode}CircularTimerText`);

    if (text) {
      text.textContent = `${mins}:${secs}`;
    }

  } else {

    const timerDisplay =
      document.getElementById(`${mode}TimerDisplay`);

    timerDisplay.textContent = `${mins}:${secs}`;

    timerDisplay.style.display =
      state.remainingTime > 0
        ? "block"
        : "none";
  }
}

function stopLoop(mode) {

  const state = appState[mode];

  state.ytPlayer?.pauseVideo();

  state.isPaused = true;
  state.isPlaying = false;

  clearInterval(state.timerInterval);
}

function resetLoop(mode) {

  const state = appState[mode];

  state.ytPlayer?.destroy();

  state.ytPlayer = null;

  clearInterval(state.timerInterval);

  state.remainingTime = 0;
  state.isPaused = false;
  state.isPlaying = false;

  document.getElementById(`${mode}YtUrl`).value = "";

  const durationId =
    mode === "loop"
      ? "loopDuration"
      : "focusDuration";

  document.getElementById(durationId).value = "";

  const timerDisplay =
    document.getElementById(`${mode}TimerDisplay`);

  timerDisplay.textContent = "";
  timerDisplay.style.display = "none";

  document.getElementById(`${mode}Player`).innerHTML = "";

  const circ =
    document.getElementById(`${mode}CircularTimer`);

  if (circ) {
    circ.style.display = "none";
    circ.remove();
  }
}

fetch("videos.json")
  .then(res => res.ok
    ? res.json()
    : Promise.reject(new Error("読み込み失敗"))
  )
  .then(data => {
    moodVideos = data;
  });

function extractVideoId(url) {

  const match =
    url.match(
      /(?:youtu\.be\/|youtube\.com.*(?:v=|\/embed\/))([a-zA-Z0-9_-]+)/
    );

  return match ? match[1] : null;
}

function copyToLoop(url) {

  document.getElementById("loopYtUrl").value = url;

  showSection('loop');

  loadVideo('loop');
}

function copyToFocus(url) {

  document.getElementById("focusYtUrl").value = url;

  showSection('focus');

  loadVideo('focus');
}

function playRandomVideo(mood) {

  const urls = moodVideos[mood];

  if (!urls || urls.length === 0) {

    alert(
      currentLang === 'jp'
        ? "その気分の動画が見つかりません。"
        : "No videos found for that mood."
    );

    return;
  }

  const randomUrl =
    urls[Math.floor(Math.random() * urls.length)];

  const videoId =
    extractVideoId(randomUrl);

  if (!videoId) {

    alert(
      currentLang === 'jp'
        ? "無効な動画URLです。"
        : "Invalid video URL."
    );

    return;
  }

  const embedUrl =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1`;

  const resultArea =
    document.getElementById("videoArea_choice");

  resultArea.innerHTML = `
    <div class="video-wrapper">
      <iframe
        src="${embedUrl}"
        allow="autoplay"
        allowfullscreen
        playsinline>
      </iframe>
    </div>

    <p>
      ${currentLang === 'jp'
        ? "あなたの今日の音楽はこちら！"
        : "Your music for today is here!"}
    </p>

    <button
      class="btn"
      onclick="copyToLoop('${randomUrl}')">
      ${currentLang === 'jp'
        ? "この動画をSympho loopで使う"
        : "Use this video with Sympho loop"}
    </button>

    <button
      class="btn"
      onclick="copyToFocus('${randomUrl}')">
      ${currentLang === 'jp'
        ? "この動画をSympho Focusで使う"
        : "Use this video with Sympho Focus"}
    </button>
  `;
}

document.querySelectorAll('.btn, #langToggle').forEach(btn => {

  btn.addEventListener('click', () => {

    btn.classList.remove('pop');

    void btn.offsetWidth;

    btn.classList.add('pop');
  });
});

</script>
