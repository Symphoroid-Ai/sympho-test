<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <script src="https://www.youtube.com/iframe_api"></script>

  <link href="https://fonts.googleapis.com/css2?family=Comfortaa&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    body {
      margin: 0;
      font-family: 'Comfortaa', 'Helvetica Neue', 'Segoe UI', sans-serif;
      background-color: #0d1b2a;
      color: white;
    }

    header, section {
      padding: 2em;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
    }

    #langToggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #00bcd4;
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      padding: 0.5rem 1rem;
      z-index: 10;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn {
      background: #00bcd4;
      border: none;
      padding: 0.8em 1.5em;
      margin: 0.5em;
      color: white;
      border: 1px solid white;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background-color 0.2s ease,
        color 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .btn:active {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .btn.pop {
      animation: popGlow 0.25s ease forwards;
    }

    @keyframes popGlow {

      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: inherit;
        color: inherit;
      }

      30% {
        transform: scale(1.3);
        box-shadow:
          0 0 20px rgba(255,255,255,0.8),
          0 0 40px rgba(0,188,212,0.5);
      }

      60% {
        transform: scale(1.1);
        box-shadow:
          0 0 15px rgba(255,255,255,0.6),
          0 0 30px rgba(0,188,212,0.4);
        background-color: #00e0ff;
        color: #fff;
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: #00bcd4;
        color: white;
      }
    }

    iframe {
      display: block;
      border: none;
    }

    section h2 {
      font-size: clamp(1rem, 5vw, 1.5rem);
      margin-bottom: 20px;
    }

    header {
      background-color: #EAEEF6;
      color: #01BEE3;
    }

    .sns-links a {
      color: #7FDBFF;
      text-decoration: none;
      font-size: 32px;
      margin: 0 10px;
    }

    .sns-links a:hover {
      color: #00bcd4;
    }

    .footer-links {
      margin: 0 5px;
      text-decoration: none;
      color: inherit;
      font-size: 0.9rem;
    }

    .footer-links:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
    }

    header img,
    .responsive-img {
      max-width: 600px;
      width: 80%;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .loop-controls,
    .upper-controls,
    .lower-controls,
    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
      justify-content: center;
    }

    .lower-controls {
      flex-direction: row;
      margin-top: 1em;
    }

    .time-input {
      display: flex;
      align-items: center;
      gap: 0.5em;
    }

    .time-input input {
      padding: 0.5em;
      width: 100px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;

      padding-bottom: 56.25%;
      margin: auto;
      height: 0;
      overflow: hidden;
      scroll-margin-top: 80px;
    }

    .video-wrapper iframe,
    .video-wrapper > div {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #videoArea_choice {
      scroll-margin-top: 80px;
    }

    .top-left {
      top: 10px;
      left: 10px;
    }

    .top-right {
      top: 10px;
      right: 10px;
    }

    .bottom-left {
      bottom: 10px;
      left: 10px;
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
    }

    .center {
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
    }

    .timer-display {
      position: absolute;
      color: #ffffff;
      z-index: 10;
      pointer-events: none;
      text-shadow:
        0 0 10px rgba(200,230,255,0.9),
        0 0 18px rgba(120,180,255,0.6);

      background: rgba(255,255,255,0.12);

      border-radius: 12px;
      padding: 0.35em 0.7em;

      backdrop-filter: blur(12px);

      box-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 30px rgba(135,206,250,0.35),
        0 6px 25px rgba(0,0,0,0.45);
    }

    .circular-timer {
      position: absolute;
      top: 50%;
      left: 50%;
      height: auto;
      width: 50%;        /* ベース値（JSで上書き可能） */
      max-width: 1000px;  /* 最大サイズ（保険） */
      transform: translate(-50%, -50%); 

      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 15;
    }

    #circularTimer {
      position: absolute;
      width: 100%;
      height: auto;
      pointer-events: none;
      display: none;
    }    

    .circular-timer svg {
      width: 50%;
      height: auto;
      max-width: 1000px;
      overflow: visible;
      display: block;
      transform: rotate(-90deg);
    }

    .circular-timer circle {
      fill: none;
      stroke-linecap: round;
    }

    .circular-timer .bg {
      stroke: rgba(255,255,255,0.5);
    }

    .circular-timer .progress {
      stroke: #ff0000;
      transition: stroke-dashoffset 0.1s linear;
      transform-origin: 50% 50%;      
    }

    .circular-timer svg text {
      font-size: 2.5em;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      transform: rotate(90deg)
      text-shadow: 0 0 6px rgba(0,0,0,0.6), 0 0 12px rgba(255,255,255,0.3);

    }

<script>

const positions = [
  "top-left",
  "top-right",
  "bottom-left",
  "bottom-right",
  "center"
];

function createState() {

  return {

    ytPlayer: null,
    timerInterval: null,
    remainingTime: 0,
    isPlaying: false,
    isPaused: false,
    isCircular: false,
    positionIndex: 0,
    playerReady: false,

    pomodoroMode: false,
    currentPhase: "focus",
    focusDuration: 0,
    breakDuration: 0

  };

}

const appStates = {

  loop: createState(),
  focus: createState()

};

let currentLang =
  localStorage.getItem('lang') || 'jp';

let moodVideos = {};

function getEl(mode, id) {
  return document.getElementById(`${mode}_${id}`);
}

document.addEventListener("DOMContentLoaded", () => {

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp' ? "English" : "日本語";

  const savedLoop =
    localStorage.getItem("loopDuration");

  if(savedLoop){
    getEl("loop", "duration").value = savedLoop;
  }

  checkYTApiReady();

});

document.getElementById("langToggle")
.addEventListener("click", () => {

  currentLang =
    currentLang === 'jp' ? 'en' : 'jp';

  localStorage.setItem("lang", currentLang);

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp' ? "English" : "日本語";

});

function updateLanguage(){

  document.querySelectorAll("[data-jp]")
  .forEach(el => {

    if("placeholder" in el){
      el.placeholder =
        el.getAttribute(`data-${currentLang}`);
    }
    else{
      el.textContent =
        el.getAttribute(`data-${currentLang}`);
    }

  });

}

function showSection(section){

  document.getElementById("choice").style.display =
    section === "choice" ? "block" : "none";

  document.getElementById("loop").style.display =
    section === "loop" ? "block" : "none";

  document.getElementById("focus").style.display =
    section === "focus" ? "block" : "none";

  setTimeout(() => {

    document.getElementById(section)
    .scrollIntoView({
      behavior: "smooth"
    });

  }, 100);

}

function checkYTApiReady(){

  if(window.YT && window.YT.Player){

    appStates.loop.playerReady = true;
    appStates.focus.playerReady = true;

  }
  else{
    setTimeout(checkYTApiReady, 200);
  }

}

window.onYouTubeIframeAPIReady = function(){

  appStates.loop.playerReady = true;
  appStates.focus.playerReady = true;

};

function toggleTimerPosition(mode){

  const state = appStates[mode];

  state.positionIndex =
    (state.positionIndex + 1) % positions.length;

  const timerDisplay =
    getEl(mode, "timerDisplay");

  timerDisplay.className =
    `timer-display ${positions[state.positionIndex]}`;

  const labels =
    currentLang === 'jp'
    ? ["左上","右上","左下","右下","中央"]
    : ["Top-Left","Top-Right","Bottom-Left","Bottom-Right","Center"];

  document.getElementById(`${mode}_positionBtn`)
  .textContent =
    (currentLang === 'jp'
      ? "表示位置："
      : "Position: ")
      + labels[state.positionIndex];

}

function toggleTimerType(mode){

  const state = appStates[mode];

  state.isCircular =
    !state.isCircular;

  const btn =
    document.getElementById(`${mode}_timerTypeBtn`);

  btn.textContent =
    state.isCircular
      ? (currentLang === 'jp'
        ? "体感タイマー"
        : "Progress Circle")
      : (currentLang === 'jp'
        ? "シンプルタイマー"
        : "Simple Timer");

  const numeric =
    getEl(mode, "timerDisplay");

  let circle =
    document.getElementById(`${mode}_circularTimer`);

  if(state.isCircular){

    numeric.style.display = "none";

    if(!circle){

      createCircularTimer(mode);

      circle =
        document.getElementById(`${mode}_circularTimer`);

    }

    circle.style.display = "flex";

    adjustTimerSizes(mode);

    updateTimerDisplay(mode);

  }
  else{

    if(circle){
      circle.style.display = "none";
    }

    numeric.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }

}

function createCircularTimer(mode){

  const wrapper =
    getEl(mode, "ytPlayer").parentElement;

  const div =
    document.createElement("div");

  div.id =
    `${mode}_circularTimer`;

  div.className =
    "circular-timer";

  div.innerHTML = `

    <svg viewBox="0 0 200 200">

      <circle
        class="bg"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <circle
        class="progress"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <text
        id="${mode}_circularTimerText"
          x="50%" y="50%"
          text-anchor="middle"
          dominant-baseline="central"
          fill="white"
          font-size="42"
          transform="rotate(90 100 100)"
          style="text-shadow: 0 0 8px black;">
          00:00
      </text>

    </svg>

  `;

  wrapper.appendChild(div);

  const progress =
    div.querySelector(".progress");

  const r =
    parseFloat(progress.getAttribute("r"));

  const circ =
    2 * Math.PI * r;

  progress.style.strokeDasharray = circ;
  progress.style.strokeDashoffset = circ;

  div.dataset.circumference = circ;

}

function adjustTimerSizes(mode){

  const wrapper =
    getEl(mode, "ytPlayer")
    .parentElement;

  const rect =
    wrapper.getBoundingClientRect();

  const h = rect.height;

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    const size = h * 1.8;

    circle.style.width =
      size + "px";

    circle.style.height =
      size + "px";

    const txt =
      document.getElementById(`${mode}_circularTimerText`);

    if(txt){

      txt.setAttribute(
        "font-size",
        Math.round(size * 0.22)
      );

    }

  }

  const timer =
    getEl(mode, "timerDisplay");

  if(timer){

    const fontPx =
      Math.round(h * 0.12);

    timer.style.fontSize =
      Math.max(
        12,
        Math.min(fontPx, 0.25 * rect.width)
      ) + "px";

  }

}

function updateTimerDisplay(mode){

  const state =
    appStates[mode];

  const mins =
    String(Math.floor(state.remainingTime / 60))
    .padStart(2, '0');

  const secs =
    String(state.remainingTime % 60)
    .padStart(2, '0');

  const timerDisplay =
    getEl(mode, "timerDisplay");

  timerDisplay.textContent =
    `${mins}:${secs}`;

  if(!state.isCircular){

    timerDisplay.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    const text =
      document.getElementById(`${mode}_circularTimerText`);

    text.textContent =
      `${mins}:${secs}`;

    const progress =
      circle.querySelector(".progress");

    const total =
      mode === "focus"
      ? state.focusDuration
      : parseInt(getEl(mode, "duration").value, 10) * 60;

    const circ =
      parseFloat(circle.dataset.circumference);

    const fraction =
      (total - state.remainingTime) / total;

    progress.style.strokeDashoffset =
      Math.max(0, circ * (1 - fraction));

  }

}

function loadVideo(mode){

  const state =
    appStates[mode];

  const url =
    getEl(mode, "ytUrl").value;

  const videoId =
    url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]+)/)?.[1];

  if(!videoId){

    alert(
      currentLang === 'jp'
      ? "正しいURLを入力してください。"
      : "Please enter a valid URL."
    );

    return;

  }

  const duration =
    parseInt(getEl(mode, "duration").value, 10);

  if(!duration || duration <= 0){

    alert(
      currentLang === 'jp'
      ? "タイマーには1分以上の整数を入力してください。"
      : "Please enter a valid duration."
    );

    return;

  }

  state.remainingTime =
    duration * 60;

  if(mode === "focus"){

    state.pomodoroMode =
      getEl(mode, "pomodoroMode").checked;

    state.focusDuration =
      duration * 60;

    state.breakDuration =
      (parseInt(getEl(mode, "breakDuration").value, 10) || 5) * 60;

  }

  updateTimerDisplay(mode);

  adjustTimerSizes(mode);

  if(!state.ytPlayer && state.playerReady){

    state.ytPlayer =
      new YT.Player(`${mode}_ytPlayer`, {

        videoId,

        playerVars: {
          playsinline: 1,
          fs: 0
        },

        events: {

          onReady: event => {

            event.target.cueVideoById(videoId);

            setTimeout(() => {
              adjustTimerSizes(mode);
            }, 300);

          },

          onStateChange: evt => {

            if(evt.data === YT.PlayerState.ENDED){

              setTimeout(() => {

                state.ytPlayer.seekTo(0, true);
                state.ytPlayer.playVideo();

              }, 300);

            }

          }

        }

      });

  }
  else if(state.ytPlayer){

    state.ytPlayer.cueVideoById(videoId);

  }

}

function playLoop(mode){

  const state =
    appStates[mode];

  if(!state.ytPlayer || state.isPlaying){
    return;
  }

  state.ytPlayer.unMute();

  state.ytPlayer.playVideo();

  state.isPlaying = true;

  clearInterval(state.timerInterval);

  state.timerInterval =
    setInterval(() => {

      state.remainingTime--;

      updateTimerDisplay(mode);

      if(state.remainingTime <= 0){

        if(mode === "focus" && state.pomodoroMode){

          if(state.currentPhase === "focus"){

            state.currentPhase = "break";

            state.remainingTime =
              state.breakDuration;

            state.ytPlayer.pauseVideo();

          }
          else{

            state.currentPhase = "focus";

            state.remainingTime =
              state.focusDuration;

            state.ytPlayer.playVideo();

          }

          updateTimerDisplay(mode);

          return;

        }

        clearInterval(state.timerInterval);

        state.ytPlayer.stopVideo();

        state.isPlaying = false;

      }

    }, 1000);

}

function stopLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.pauseVideo();

  clearInterval(state.timerInterval);

  state.isPlaying = false;

}

function resetLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.destroy();

  state.ytPlayer = null;

  clearInterval(state.timerInterval);

  state.remainingTime = 0;
  state.isPlaying = false;
  state.isPaused = false;

  getEl(mode, "ytUrl").value = "";

  const timer =
    getEl(mode, "timerDisplay");

  timer.textContent = "";
  timer.style.display = "none";

  getEl(mode, "ytPlayer").innerHTML = "";

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){
    circle.style.display = "none";
    circle.remove();
  }

}

fetch("videos.json")

.then(res =>
  res.ok
    ? res.json()
    : Promise.reject(new Error("読み込み失敗"))
)

.then(data => {

  moodVideos = data;

})

.catch(err => {

  alert("読み込みエラー: " + err.message);

});

function extractVideoId(url){

  const match =
    url.match(/(?:youtu\.be\/|youtube\.com.*(?:v=|\/embed\/))([a-zA-Z0-9_-]+)/);

  return match ? match[1] : null;

}

function copyToLoop(url){

  getEl("loop", "ytUrl").value = url;

  showSection("loop");

  loadVideo("loop");

}

function copyToFocus(url){

  getEl("focus", "ytUrl").value = url;

  showSection("focus");

  loadVideo("focus");

}

function playRandomVideo(mood){

  const urls =
    moodVideos[mood];

  if(!urls || urls.length === 0){

    alert(
      currentLang === 'jp'
      ? "その気分の動画が見つかりません。"
      : "No videos found for that mood."
    );

    return;

  }

  const randomUrl =
    urls[Math.floor(Math.random() * urls.length)];

  const videoId =
    extractVideoId(randomUrl);

  const embedUrl =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&playsinline=1`;

  const resultArea =
    document.getElementById("videoArea_choice");

  resultArea.innerHTML = `
    <p>
      ${currentLang === 'jp'
        ? "あなたにぴったりの音楽を占っています…"
        : "Fortune-telling your perfect music..."}
    </p>
  `;

  setTimeout(() => {

    resultArea.innerHTML = `

      <div class="video-wrapper">

        <iframe
          src="${embedUrl}"
          allow="autoplay"
          allowfullscreen
          playsinline>
        </iframe>

      </div>

      <p>
        ${currentLang === 'jp'
          ? "あなたの今日の音楽はこちら！"
          : "Your music for today is here!"}
      </p>

      <p>
        URL:
        <span>${randomUrl}</span>
      </p>

      <button
        class="btn"
        onclick="copyToLoop('${randomUrl}')">

        ${currentLang === 'jp'
          ? "この動画をSympho loopで使う"
          : "Use this video with Sympho loop"}

      </button>

      <button
        class="btn"
        onclick="copyToFocus('${randomUrl}')">

        ${currentLang === 'jp'
          ? "この動画をSympho Focusで使う"
          : "Use this video with Sympho Focus"}

      </button>

    `;

    document.getElementById("videoArea_choice")
    .scrollIntoView({
      behavior: "smooth"
    });

  }, 2000);

}

document.querySelectorAll('.btn')
.forEach(btn => {

  btn.addEventListener('click', () => {

    btn.classList.remove('pop');

    void btn.offsetWidth;

    btn.classList.add('pop');

  });

});

window.addEventListener('resize', () => {

  adjustTimerSizes("loop");
  adjustTimerSizes("focus");

});

</script>

</body>
