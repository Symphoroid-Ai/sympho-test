<script>
function openSettings(mode){

  document
    .getElementById("settingsPanel")
    .classList.add("show");

  document
    .getElementById("settingsOverlay")
    .classList.add("show");

  document
    .getElementById("loopSettings")
    .style.display =
      mode === "loop"
      ? "block"
      : "none";

  document
    .getElementById("focusSettings")
    .style.display =
      mode === "focus"
      ? "block"
      : "none";
}

function closeSettings(){

  document
    .getElementById("settingsPanel")
    .classList.remove("show");

  document
    .getElementById("settingsOverlay")
    .classList.remove("show");

  const loopUrl =
    document.getElementById("loop_ytUrl")?.value?.trim();

  const focusUrl =
    document.getElementById("focus_ytUrl")?.value?.trim();

  if(loopUrl){
    loadVideo("loop");
  }

  if(focusUrl){
    loadVideo("focus");
  }

}

document.addEventListener("DOMContentLoaded", () => {

  const overlay =
    document.getElementById("settingsOverlay");

  if(overlay){

    overlay.addEventListener(
      "click",
      closeSettings
    );

  }
  updateModeUI("loop");
  updateModeUI("focus");
  setupLandscapeVideoFocus();

});

</script>

const positions = [
  "top-left",
  "top-right",
  "bottom-left",
  "bottom-right",
  "center"
];

function createState() {

  return {

    ytPlayer: null,
    timerInterval: null,
    remainingTime: 0,
    isPlaying: false,
    isPaused: false,
    isCircular: false,
    positionIndex: 0,
    playerReady: false,

    pomodoroMode: false,
    currentPhase: "focus",
    focusDuration: 0,
    breakDuration: 0,
    loopDuration: 0

  };

}

const appStates = {

  loop: createState(),
  focus: createState()

};
async function fadeVolume(player, from, to, duration = 1200){

  if(!player || typeof player.setVolume !== "function"){
    return;
  }

  const steps = 24;
  const interval = duration / steps;

  for(let i = 0; i <= steps; i++){

    const progress = i / steps;

    const volume =
      from + ((to - from) * progress);

    player.setVolume(
      Math.max(0, Math.min(100, volume))
    );

    await new Promise(resolve =>
      setTimeout(resolve, interval)
    );
  }
}

async function fadeOutAndPause(player){

  if(!player) return;

  const currentVolume =
    typeof player.getVolume === "function"
      ? player.getVolume()
      : 100;

  await fadeVolume(
    player,
    currentVolume,
    0,
    1000
  );

  player.pauseVideo();

  player.setVolume(currentVolume);
}

function fadeInAndPlay(player){

  if(!player) return;

  const targetVolume =
    typeof player.getVolume === "function"
      ? player.getVolume()
      : 100;

  player.setVolume(0);

  player.playVideo();

  fadeVolume(
    player,
    0,
    targetVolume,
    1200
  );
}

function updateLanguage(){

  document.querySelectorAll("[data-jp]")
  .forEach(el => {

    if("placeholder" in el){

      el.placeholder =
        el.getAttribute(`data-${currentLang}`);

    }
    else{

      el.textContent =
        el.getAttribute(`data-${currentLang}`);

    }

  });

  updateModeUI("loop");
  updateModeUI("focus");

}
function updateModeUI(mode){

  const state = appStates[mode];

  if(!state) return;

  /* =========================
     スイッチ同期
  ========================= */

  const switchTracks = [

//    document.getElementById(`${mode}_switchTrack`),

    document.getElementById(`${mode}_switchTrack_settings`)

  ];

  switchTracks.forEach(track => {

    if(!track) return;

    track.classList.toggle(
      "active",
      state.isCircular
    );

  });

  /* =========================
     Position表示制御
  ========================= */

  const positionTargets = [

//    document.getElementById(`${mode}_positionWrap`),

    document.getElementById(`${mode}_positionBtn_settings`)
      ?.closest(".settings-row")

  ];

  positionTargets.forEach(el => {

    if(!el) return;

    el.style.display =
      state.isCircular
        ? "none"
        : "flex";

  });

  /* =========================
     Positionボタン文言
  ========================= */

  const labels =
    currentLang === 'jp'
    ? ["左上","右上","左下","右下","中央"]
    : ["Top-Left","Top-Right","Bottom-Left","Bottom-Right","Center"];

  const positionButtons = [

//    document.getElementById(`${mode}_positionBtn`),

    document.getElementById(`${mode}_positionBtn_settings`)

  ];

  positionButtons.forEach(btn => {

    if(!btn) return;

    btn.textContent =
      (currentLang === 'jp'
        ? "表示位置："
        : "Position: ")
      + labels[state.positionIndex];

  });



}
function showSection(section){

  // 表示切替
  document.getElementById("choice").style.display =
    section === "choice" ? "block" : "none";

  document.getElementById("loop").style.display =
    section === "loop" ? "block" : "none";

  document.getElementById("focus").style.display =
    section === "focus" ? "block" : "none";

  // loop動画停止
  if(section !== "loop"){

    const loopState = appStates.loop;

    if(loopState.ytPlayer){

      loopState.ytPlayer.pauseVideo();

    }

    clearInterval(loopState.timerInterval);

    loopState.isPlaying = false;

  }

  // focus動画停止
  if(section !== "focus"){

    const focusState = appStates.focus;

    if(focusState.ytPlayer){

      focusState.ytPlayer.pauseVideo();

    }

    clearInterval(focusState.timerInterval);

    focusState.isPlaying = false;

  }

  // choice動画停止
  if(section !== "choice"){

    const choiceArea =
      document.getElementById("videoArea_choice");

    const iframe =
      choiceArea.querySelector("iframe");

    if(iframe){

      iframe.src = "";

    }

  }

  // スクロール
  setTimeout(() => {

    document.getElementById(section)
    .scrollIntoView({
      behavior: "smooth"
    });

  }, 100);
  requestAnimationFrame(() => {

    document
      .querySelectorAll(`#${section} .wheel-scroll`)
      .forEach(wheel => {

        const value =
          parseInt(wheel.dataset.value, 10);

        if(!value) return;

        const target =
          [...wheel.children]
          .find(el =>
            parseInt(el.dataset.value, 10) === value
          );

        if(!target) return;

        wheel.scrollTop =
          target.offsetTop
          - (wheel.clientHeight / 2)
          + (target.clientHeight / 2);

      });

  });
}

  else{

  }

}

function setupLandscapeVideoFocus(){

  const applyLandscapeMode = () => {

    const isMobile =
      window.matchMedia("(max-width: 1024px)").matches;

    const isLandscape =
      window.matchMedia("(orientation: landscape)").matches;

    if(isMobile && isLandscape){

      document.body.classList.add(
        "landscape-video-focus"
      );

      requestAnimationFrame(() => {

 //       window.scrollTo(0, 0);
          window.scrollTo({
          top:1,
          behavior:"instant"
        });

      });

    }
    else{

      document.body.classList.remove(
        "landscape-video-focus"
      );

    }

  };

  applyLandscapeMode();

  window.addEventListener(
    "orientationchange",
    () => {

      setTimeout(() => {

        applyLandscapeMode();

 //       window.scrollTo(0,0);

      }, 250);

    }
  );

  window.addEventListener(
    "resize",
    applyLandscapeMode
  );

  if(window.visualViewport){

    window.visualViewport
    .addEventListener(
      "resize",
      applyLandscapeMode
    );

  }

}
function toggleTimerPosition(mode){

  const state = appStates[mode];

  state.positionIndex =
    (state.positionIndex + 1) % positions.length;

  const timerDisplay =
    getEl(mode, "timerDisplay");

  timerDisplay.className =
    `timer-display ${positions[state.positionIndex]}`;

  if(
    mode === "focus" &&
    !state.isCircular &&
    positions[state.positionIndex] === "center" &&
    state.currentPhase === "break"
  ){

    timerDisplay.style.transform =
      "translate(-50%, 70%)";

  }
  else{

    timerDisplay.style.transform = "";

  }
 
  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    circle.className = "circular-timer";

    if(positions[state.positionIndex] !== "center"){
      circle.classList.add(
        positions[state.positionIndex]
      );
    }

  }
  updateModeUI(mode);
}

function toggleTimerType(mode){

  const state = appStates[mode];

  state.isCircular =
    !state.isCircular;

  const numeric =
    getEl(mode, "timerDisplay");

  let circle =
    document.getElementById(`${mode}_circularTimer`);

  if(state.isCircular){

    numeric.style.display = "none";

    if(!circle){

      createCircularTimer(mode);

      circle =
        document.getElementById(`${mode}_circularTimer`);

    }

    circle.style.display = "flex";

    adjustTimerSizes(mode);

    updateTimerDisplay(mode);

  }
  else{

    if(circle){
      circle.style.display = "none";
    }

    numeric.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }
  updateModeUI(mode);
}

function createCircularTimer(mode){

  const wrapper =
    getEl(mode, "ytPlayer").parentElement;

  const div =
    document.createElement("div");

  div.id =
    `${mode}_circularTimer`;

  div.className =
    "circular-timer";

  div.innerHTML = `

    <svg viewBox="0 0 200 200">

      <circle
        class="bg"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <circle
        class="progress"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <text
        id="${mode}_circularTimerText"
        x="100"
        y="100"

        text-anchor="middle"
        dominant-baseline="middle"
        fill="white"
        font-size="42"
        transform="rotate(90 100 100)"
        style="text-shadow: 0 0 8px black;">
        00:00
      </text>
      <text
        id="${mode}_phaseText"
        x="100"
        y="132"
        text-anchor="middle"
        fill="#bfe9ff"
        font-size="18"
        transform="rotate(90 100 100)"
        style="
          text-shadow:
            0 0 6px rgba(0,0,0,0.7),
            0 0 10px rgba(120,200,255,0.5);
          opacity:0;
        ">
        BREAK
      </text>

    </svg>

  `;

wrapper.appendChild(div);

if(positions[appStates[mode].positionIndex] !== "center"){
  div.classList.add(
    positions[appStates[mode].positionIndex]
  );
}

  const progress =
    div.querySelector(".progress");

  const r =
    parseFloat(progress.getAttribute("r"));

  const circ =
    2 * Math.PI * r;

  progress.style.strokeDasharray = circ;
  progress.style.strokeDashoffset = circ;

  div.dataset.circumference = circ;

}

function adjustTimerSizes(mode){

  const wrapper =
    getEl(mode, "ytPlayer")
    .parentElement;

  const rect =
    wrapper.getBoundingClientRect();

  const h = rect.height;

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    const size = Math.min(rect.width, rect.height) * 0.75;

    circle.style.width =
      size + "px";

    circle.style.height =
      size + "px";

    const txt =
      document.getElementById(`${mode}_circularTimerText`);

    if(txt){

      txt.setAttribute(
        "font-size",
        Math.round(size * 0.14)
      );

    }
  }

  const timer =
    getEl(mode, "timerDisplay");

  if(timer){

    const fontPx =
      Math.round(h * 0.12);

    timer.style.fontSize =
      Math.max(
        12,
        Math.min(fontPx, 0.25 * rect.width)
      ) + "px";

  }

}

function updateTimerDisplay(mode){

  const state =
    appStates[mode];

  const mins =
    String(Math.floor(state.remainingTime / 60))
    .padStart(2, '0');

  const secs =
    String(state.remainingTime % 60)
    .padStart(2, '0');

const timerDisplay =
  getEl(mode, "timerDisplay");

timerDisplay.textContent =
  `${mins}:${secs}`;

  if(mode === "focus" && !state.isCircular){

    const currentPosition =
      positions[state.positionIndex];

    if(
      currentPosition === "center" &&
      state.currentPhase === "break"
    ){

      timerDisplay.style.transform =
        "translate(-50%, 70%)";

    }
    else if(currentPosition === "center"){

      timerDisplay.style.transform =
        "translate(-50%, -50%)";

    }
    else{

      timerDisplay.style.transform =
        "";

    }

  }
  if(!state.isCircular){

    timerDisplay.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

  const text =
    document.getElementById(`${mode}_circularTimerText`);

  text.textContent =
    `${mins}:${secs}`;

  // 休憩中だけタイマー位置を下げる
  if(mode === "focus" && state.currentPhase === "break"){
    text.setAttribute("dy", "45");
  }
  else{
    text.setAttribute("dy", "0");
  }

    const progress =
      circle.querySelector(".progress");

    // focusの休憩時間だけ青にする
    if(mode === "focus" && state.currentPhase === "break"){
      progress.style.stroke = "#4da6ff";
    }
    else{
      progress.style.stroke = "#ff0000";
    }

    const total =
      mode === "focus"
      ? (
          state.currentPhase === "break"
          ? state.breakDuration
          : state.focusDuration
        )
      : state.loopDuration;

    const circ =
      parseFloat(circle.dataset.circumference);

    const fraction =
      (total - state.remainingTime) / total;

    progress.style.strokeDashoffset =
      Math.max(0, circ * (1 - fraction));
  }
  if(mode === "focus"){

      const breakOverlay =
        document.getElementById("focus_breakOverlay");

      if(breakOverlay){

        breakOverlay.style.opacity =
          state.currentPhase === "break"
            ? "1"
            : "0";
      }

  }
}

function loadVideo(mode){

  const state =
    appStates[mode];

  clearInterval(state.timerInterval);

    state.isPlaying = false;
    state.isPaused = false;

    if(state.ytPlayer){
 //   state.ytPlayer.pauseVideo();
      fadeOutAndPause(state.ytPlayer);
    }


  const url =
    getEl(mode, "ytUrl").value;

  const videoId =
    url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]+)/)?.[1];

  if(!videoId){

    alert(
      currentLang === 'jp'
      ? "正しいURLを入力してください。"
      : "Please enter a valid URL."
    );

    return;

  }

  const duration =
//  parseInt(getEl(mode, "duration").value, 10);
    parseInt(
      document.getElementById(`${mode}_duration_settings`).dataset.value,
      10
    )
  if(!duration || duration <= 0){

    alert(
      currentLang === 'jp'
      ? "タイマーには1分以上の整数を入力してください。"
      : "Please enter a valid duration."
    );

    return;

  }

  state.remainingTime =
    duration * 60;

  if(mode === "loop"){
    state.loopDuration =
      duration * 60;
  }

  if(mode === "focus"){

    state.pomodoroMode = true;

    state.currentPhase = "focus";

    state.focusDuration =
      duration * 60;

//    state.breakDuration =
//      (parseInt(getEl(mode, "breakDuration").value, 10) || 5) * 60;
    state.breakDuration =
      (
        parseInt(
          document.getElementById("focus_breakDuration_settings").dataset.value,
          10
        ) || 5
      ) * 60;
    state.remainingTime =
      state.focusDuration;

    const circle =
      document.querySelector(`#${mode}_circularTimer .progress`);

    if(circle){
      circle.style.stroke = "#ff0000";
    }
  }
  if(
    state.isCircular &&
    !document.getElementById(`${mode}_circularTimer`)
  ){
    createCircularTimer(mode);
  }
  updateTimerDisplay(mode);

  adjustTimerSizes(mode);

  if(!state.ytPlayer && state.playerReady){

    state.ytPlayer =
      new YT.Player(`${mode}_ytPlayer`, {

        videoId,

        playerVars: {
          playsinline: 1,
          fs: 0
        },

        events: {

          onReady: event => {

            event.target.cueVideoById(videoId);

            setTimeout(() => {
              adjustTimerSizes(mode);
            }, 300);

          },

          onStateChange: evt => {

            if(evt.data === YT.PlayerState.ENDED){

              setTimeout(() => {

                state.ytPlayer.seekTo(0, true);
            //    state.ytPlayer.playVideo();
                fadeInAndPlay(state.ytPlayer);

              }, 300);

            }

          }

        }

      });

  }
  else if(state.ytPlayer){

    state.ytPlayer.cueVideoById(videoId);

  }

}

  function playLoop(mode){

    const state =
      appStates[mode];

    if(!state.ytPlayer){
      return;
    }

    state.ytPlayer.unMute();

    // focus休憩中は動画を再生しない
    if(!(mode === "focus" && state.currentPhase === "break")){
    //  state.ytPlayer.playVideo();
      fadeInAndPlay(state.ytPlayer);
    }

    state.isPlaying = true;

    if(mode === "focus"){
      document
        .getElementById("focus")
        .classList.add("focus-running");
    }

    if(mode === "loop"){
      document
        .getElementById("loop")
        .classList.add("loop-running");
    }
    if(state.timerInterval){
      clearInterval(state.timerInterval);
    }

    state.timerInterval =
      setInterval(() => {
        
      state.remainingTime--;

      updateTimerDisplay(mode);

      if(state.remainingTime <= 0){

        if(mode === "focus"){

          if(state.currentPhase === "focus"){

            state.currentPhase = "break";

            state.remainingTime =
              state.breakDuration;

          //state.ytPlayer.pauseVideo();
            fadeOutAndPause(state.ytPlayer);

            document
              .getElementById("focus_breakOverlay")
              ?.classList.add("show");

          }
          else{

            state.currentPhase = "focus";

            state.remainingTime =
              state.focusDuration;

          //state.ytPlayer.playVideo();
            fadeInAndPlay(state.ytPlayer);
            document
              .getElementById("focus_breakOverlay")
              ?.classList.remove("show");

          }

          updateTimerDisplay(mode);

          return;

        }

        clearInterval(state.timerInterval);

        state.ytPlayer.stopVideo();

        state.isPlaying = false;

      }

    }, 1000);

}

function stopLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.pauseVideo();

  clearInterval(state.timerInterval);

  state.isPlaying = false;
  
  if(mode === "focus"){
    document
      .getElementById("focus")
      .classList.remove("focus-running");

    document
      .getElementById("focus_breakOverlay")
      ?.classList.remove("show");
  }

  if(mode === "loop"){
    document
      .getElementById("loop")
      .classList.remove("loop-running");
  }
}

function resetLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.destroy();

  state.ytPlayer = null;

  clearInterval(state.timerInterval);

  state.remainingTime = 0;
  state.isPlaying = false;
  state.isPaused = false;

  getEl(mode, "ytUrl").value = "";

  const timer =
    getEl(mode, "timerDisplay");

  timer.textContent = "";
  timer.style.display = "none";

  getEl(mode, "ytPlayer").innerHTML = "";

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){
    circle.style.display = "none";
    circle.remove();
  }
  if(mode === "focus"){
    document
      .getElementById("focus")
      .classList.remove("focus-running");

    document
      .getElementById("focus_breakOverlay")
      ?.classList.remove("show");
  }
  if(mode === "loop"){
    document
      .getElementById("loop")
      .classList.remove("loop-running");
  }  
}

function extractVideoId(url){

  const match =
    url.match(/(?:youtu\.be\/|youtube\.com.*(?:v=|\/embed\/))([a-zA-Z0-9_-]+)/);

  return match ? match[1] : null;

}

function createWheelPicker(id, min, max, defaultValue){

  const wheel =
    document.getElementById(id);

  wheel.innerHTML = "";

  for(let i=min; i<=max; i++){

    const item =
      document.createElement("div");

    item.className = "wheel-item";

    item.dataset.value = i;

//  item.textContent = i;
    item.innerHTML = `
      <span class="wheel-number">${i}</span>
      <span class="wheel-unit">MIN</span>
    `;
    wheel.appendChild(item);

  }

  const saved =
    localStorage.getItem(id);

  let currentValue =
    parseInt(saved || defaultValue, 10);

  function setActive(value){

    currentValue = value;

    wheel.dataset.value = value;

    localStorage.setItem(id, value);

    wheel.querySelectorAll(".wheel-item")
    .forEach(item => {

      item.classList.toggle(
        "active",
        parseInt(item.dataset.value, 10) === value
      );

    });

  }


  function scrollToValue(value){

    const target =
      [...wheel.children]
      .find(el =>
        parseInt(el.dataset.value, 10) === value
      );

    if(!target) return;

    const targetTop =
      target.offsetTop
      - (wheel.clientHeight / 2)
      + (target.clientHeight / 2);

    wheel.scrollTop = targetTop;
  }

  wheel.setValue = function(value){

    currentValue = parseInt(value, 10);

    requestAnimationFrame(() => {

      const target =
        [...wheel.children]
        .find(el =>
          parseInt(el.dataset.value, 10) === currentValue
        );

      if(!target) return;

      const targetTop =
        target.offsetTop
        - (wheel.clientHeight / 2)
        + (target.clientHeight / 2);

      wheel.scrollTop = targetTop;

      setActive(currentValue);

    });

  };
  requestAnimationFrame(() => {

    requestAnimationFrame(() => {

      wheel.setValue(currentValue);

    });

  });

  let ticking = false;
  let snapTimeout = null;

  function getClosestItem(){

    const wheelRect =
      wheel.getBoundingClientRect();

    const wheelCenter =
      wheelRect.top + wheelRect.height / 2;

    let closest = null;
    let closestDist = Infinity;

    wheel.querySelectorAll(".wheel-item")
    .forEach(item => {

      const rect =
        item.getBoundingClientRect();

      const itemCenter =
        rect.top + rect.height / 2;

      const dist =
        Math.abs(wheelCenter - itemCenter);

      if(dist < closestDist){

        closestDist = dist;
        closest = item;

      }

    });

    return closest;

  }

wheel.addEventListener("scroll", () => {

  if(ticking) return;

  ticking = true;

  requestAnimationFrame(() => {

    const closest =
      getClosestItem();

    if(closest){

      setActive(
        parseInt(closest.dataset.value, 10)
      );

    }

    ticking = false;

  });

  clearTimeout(snapTimeout);

  snapTimeout = setTimeout(() => {

    const closest =
      getClosestItem();

    if(!closest) return;

    const value =
      parseInt(closest.dataset.value, 10);

    scrollToValue(value);

    setActive(value);

  }, 80);

});

wheel.addEventListener("wheel", (e) => {

  e.preventDefault();

  const itemHeight = 42;

  const direction =
    e.deltaY > 0 ? 1 : -1;

  wheel.scrollTo({

    top:
      Math.round(
        wheel.scrollTop / itemHeight
      ) * itemHeight
      + direction * itemHeight,

    behavior:"smooth"

  });

}, { passive:false });

}

document.querySelectorAll(".video-select-grid")
.forEach(carousel => {

  let isDown = false;
  let startX;
  let scrollLeft;

  carousel.addEventListener("mousedown", e => {

    isDown = true;

    carousel.classList.add("dragging");

    startX =
      e.pageX - carousel.offsetLeft;

    scrollLeft =
      carousel.scrollLeft;

  });

  carousel.addEventListener("mouseleave", () => {

    isDown = false;

    carousel.classList.remove("dragging");

  });

  carousel.addEventListener("mouseup", () => {

    isDown = false;

    carousel.classList.remove("dragging");

  });

  carousel.addEventListener("mousemove", e => {

    if(!isDown) return;

    e.preventDefault();

    const x =
      e.pageX - carousel.offsetLeft;

    const walk =
      (x - startX) * 1.5;

    carousel.scrollLeft =
      scrollLeft - walk;

  });

});
