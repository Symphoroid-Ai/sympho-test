  <style>

    body {
      margin: 0;
      font-family: 'Comfortaa', 'Helvetica Neue', 'Segoe UI', sans-serif;
      background-color: #0d1b2a;
      color: white;
    }

    header, section {
      padding: 2em;
      text-align: center;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 3rem);
    }

    #langToggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: #00bcd4;
      color: white;
      border: 1px solid white;
      border-radius: 5px;
      padding: 0.5rem 1rem;
      z-index: 10;
      cursor: pointer;
      font-size: 1rem;
    }

    .btn {
      background: #00bcd4;
      border: none;
      padding: 0.8em 1.5em;
      margin: 0.5em;
      color: white;
      border: 1px solid white;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        background-color 0.2s ease,
        color 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .btn:active {
      transform: scale(1.05);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .btn.pop {
      animation: popGlow 0.25s ease forwards;
    }

    @keyframes popGlow {

      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: inherit;
        color: inherit;
      }

      30% {
        transform: scale(1.3);
        box-shadow:
          0 0 20px rgba(255,255,255,0.8),
          0 0 40px rgba(0,188,212,0.5);
      }

      60% {
        transform: scale(1.1);
        box-shadow:
          0 0 15px rgba(255,255,255,0.6),
          0 0 30px rgba(0,188,212,0.4);
        background-color: #00e0ff;
        color: #fff;
      }

      100% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255,255,255,0);
        background-color: #00bcd4;
        color: white;
      }
    }

    iframe {
      display: block;
      border: none;
    }

    section h2 {
      font-size: clamp(1rem, 5vw, 1.5rem);
      margin-bottom: 20px;
    }

    header {
      background-color: #EAEEF6;
      color: #01BEE3;
    }

    .sns-links a {
      color: #7FDBFF;
      text-decoration: none;

    .footer-links {

    .btn-group {

      width: 100%;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      margin: auto;
      overflow: hidden;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .video-wrapper iframe,

    .video-wrapper > #focus_ytPlayer {

      inset: 0;
      width: 100%;
      height: 100%;

    #videoArea_choice {

      left: 10px;
    }

    .top-right {
      top: 10px;
      right: 10px;
    }

    .bottom-left {
      bottom: 10px;
      left: 10px;
    }

    .bottom-right {
      bottom: 10px;
      right: 10px;
    }

    .center {
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%);
    }

    .timer-display {
      position: absolute;
      color: #ffffff;
      z-index: 10;
      pointer-events: none;
      text-shadow:
        0 0 10px rgba(200,230,255,0.9),
        0 0 18px rgba(120,180,255,0.6);

      background: rgba(255,255,255,0.12);

      border-radius: 12px;
      padding: 0.35em 0.7em;

      backdrop-filter: blur(12px);

      box-shadow:
        0 0 18px rgba(255,255,255,0.45),
        0 0 30px rgba(135,206,250,0.35),
        0 6px 25px rgba(0,0,0,0.45);
    }

    .circular-timer {
      position: absolute;

      top: 50%;
      left: 50%;

      transform: translate(-50%, -50%);

      width: 60%;
      aspect-ratio: 1 / 1;

      display: flex;
      align-items: center;
      justify-content: center;

      pointer-events: none;
      z-index: 15;
    }


    .circular-timer svg {
      width: 100%;
      height: 100%;

      overflow: visible;
      display: block;

      transform: rotate(-90deg);
    }

    .circular-timer circle {
      fill: none;
      stroke-linecap: round;
    }

    .circular-timer .bg {
      stroke: rgba(255,255,255,0.5);
    }

    .circular-timer .progress {
      stroke: #ff0000;
      transition: stroke-dashoffset 0.1s linear;
      transform-origin: 50% 50%;      
    }

    .circular-timer svg text {
      font-size: 2.5em;
      fill: white;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;

      text-shadow:
        0 0 6px rgba(0,0,0,0.6),
        0 0 12px rgba(255,255,255,0.3);
    }

/***********************************/    
    .wheel-picker{
      position:relative;
      width:140px;
      height:220px;
      margin:auto;

      border-radius:28px;

      overflow:hidden;

      background:rgba(255,255,255,0.08);

      backdrop-filter:blur(20px);

      box-shadow:
        inset 0 1px 1px rgba(255,255,255,0.25),
        0 10px 30px rgba(0,0,0,0.35);
    }

    /* 上下フェード */
    .wheel-picker::before,
    .wheel-picker::after{
      content:"";
      position:absolute;
      left:0;
      width:100%;
      height:70px;
      z-index:5;
      pointer-events:none;
    }

    .wheel-picker::before{
      top:0;

      background:linear-gradient(
        to bottom,
        rgba(13,27,42,0.95),
        rgba(13,27,42,0)
      );
    }

    .wheel-picker::after{
      bottom:0;

      background:linear-gradient(
        to top,
        rgba(13,27,42,0.95),
        rgba(13,27,42,0)
      );
    }

    /* 中央発光ライン */
    .wheel-highlight{
      position:absolute;

      top:50%;
      left:10px;
      right:10px;

      height:52px;

      transform:translateY(-50%);

      border-radius:16px;

      background:rgba(255,255,255,0.12);

      box-shadow:
        0 0 18px rgba(120,200,255,0.45),
        inset 0 0 12px rgba(255,255,255,0.25);

      border:1px solid rgba(255,255,255,0.18);

      pointer-events:none;
      z-index:4;
    }

    /* スクロール本体 */
    .wheel-scroll{
      height:100%;

      overflow-y:auto;

      scroll-snap-type:y mandatory;

      -webkit-overflow-scrolling:touch;

      scrollbar-width:none;

      position:relative;
      z-index:2;

      padding:0;

      scroll-behavior:auto;
    }
    .wheel-item:first-child{
      margin-top:84px;
    }

    .wheel-item:last-child{
      margin-bottom:84px;
    }
    .wheel-scroll::-webkit-scrollbar{
      display:none;
    }

    /* 各項目 */
    .wheel-item{
      height:52px;
      min-height:52px;

      display:flex;
      align-items:center;
      justify-content:center;

      line-height:52px;

      box-sizing:border-box;

      scroll-snap-align:center;

      color:white;

      font-size:28px;
      font-weight:600;

      letter-spacing:1px;

      transition:
        opacity 0.2s,
        text-shadow 0.2s;

      opacity:0.45;
    }

    /* 選択中 */
    .wheel-item.active{
      opacity:1;

      text-shadow:
        0 0 12px rgba(255,255,255,0.9),
        0 0 25px rgba(120,200,255,0.8);
    }

    .video-select-grid{
      width:100%;
      max-width:1000px;

      display:flex;

      gap:16px;

      overflow-x:auto;
      overflow-y:hidden;

      padding:10px 6px 20px;

      margin:20px auto;

      scroll-snap-type:x mandatory;

      -webkit-overflow-scrolling:touch;

      scrollbar-width:none;
    }

    .video-select-grid::-webkit-scrollbar{
      display:none;
    }

    .video-carousel-wrapper{
      position:relative;
      width:100%;
      max-width:1100px;
      margin:auto;
    }

    .carousel-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      z-index:20;

      width:48px;
      height:48px;

      border:none;
      border-radius:50%;

      background:rgba(255,255,255,0.15);

      color:white;
      font-size:22px;

      cursor:pointer;

      backdrop-filter:blur(10px);

      box-shadow:
        0 0 15px rgba(255,255,255,0.15);

      transition:0.2s;
    }

    .carousel-btn:hover{
      transform:translateY(-50%) scale(1.08);

      box-shadow:
        0 0 20px rgba(120,200,255,0.5);
    }

    .carousel-btn.left{
      left:-10px;
    }

    .carousel-btn.right{
      right:-10px;
    }

    .video-card.active{

      border:2px solid rgba(120,220,255,0.9);

      box-shadow:
        0 0 18px rgba(120,220,255,0.7),
        0 0 35px rgba(120,220,255,0.45);

      transform:scale(1.04);
    }    
    .video-select-grid{
      cursor: grab;
    }

    .video-select-grid.dragging{
      cursor: grabbing;
    }
    .video-card{
      flex:0 0 280px;
      scroll-snap-align:center;
      
      background:rgba(255,255,255,0.08);
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:0.25s;
      backdrop-filter:blur(10px);
      padding:0;
    }

    .video-card:hover{
      transform:scale(1.03);

      box-shadow:
        0 0 20px rgba(255,255,255,0.2);
    }

    .video-card img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      display:block;
    }

  </style>

const positions = [
  "top-left",
  "top-right",
  "bottom-left",
  "bottom-right",
  "center"
];

function createState() {

  return {

    ytPlayer: null,
    timerInterval: null,
    remainingTime: 0,
    isPlaying: false,
    isPaused: false,
    isCircular: false,
    positionIndex: 0,
    playerReady: false,

    pomodoroMode: false,
    currentPhase: "focus",
    focusDuration: 0,
    breakDuration: 0,
    loopDuration: 0

  };

}

const appStates = {

  loop: createState(),
  focus: createState()

};

let currentLang =
  localStorage.getItem('lang') || 'jp';

let moodVideos = {};

function getEl(mode, id) {
  return document.getElementById(`${mode}_${id}`);
}

document.addEventListener("DOMContentLoaded", () => {

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp' ? "English" : "日本語";

  const savedLoop =
    localStorage.getItem("loopDuration");

  if(savedLoop){
    getEl("loop", "duration").value = savedLoop;
  }

  createWheelPicker("loop_duration", 1, 180, 10);
  createWheelPicker("focus_duration", 1, 180, 25);
  createWheelPicker("focus_breakDuration", 1, 60, 5);

  createVideoList("loop");
  createVideoList("focus");

  restoreSavedSettings();

  checkYTApiReady();

});

document.getElementById("langToggle")
.addEventListener("click", () => {

  currentLang =
    currentLang === 'jp' ? 'en' : 'jp';

  localStorage.setItem("lang", currentLang);

  updateLanguage();

  document.getElementById("langToggle").textContent =
    currentLang === 'jp' ? "English" : "日本語";

});

function updateLanguage(){

  document.querySelectorAll("[data-jp]")
  .forEach(el => {

    if("placeholder" in el){
      el.placeholder =
        el.getAttribute(`data-${currentLang}`);
    }
    else{
      el.textContent =
        el.getAttribute(`data-${currentLang}`);
    }

  });

}

function showSection(section){

  // 表示切替
  document.getElementById("choice").style.display =
    section === "choice" ? "block" : "none";

  document.getElementById("loop").style.display =
    section === "loop" ? "block" : "none";

  document.getElementById("focus").style.display =
    section === "focus" ? "block" : "none";

  // loop動画停止
  if(section !== "loop"){

    const loopState = appStates.loop;

    if(loopState.ytPlayer){

      loopState.ytPlayer.pauseVideo();

    }

    clearInterval(loopState.timerInterval);

    loopState.isPlaying = false;

  }

  // focus動画停止
  if(section !== "focus"){

    const focusState = appStates.focus;

    if(focusState.ytPlayer){

      focusState.ytPlayer.pauseVideo();

    }

    clearInterval(focusState.timerInterval);

    focusState.isPlaying = false;

  }

  // choice動画停止
  if(section !== "choice"){

    const choiceArea =
      document.getElementById("videoArea_choice");

    const iframe =
      choiceArea.querySelector("iframe");

    if(iframe){

      iframe.src = "";

    }

  }

  // スクロール
  setTimeout(() => {

    document.getElementById(section)
    .scrollIntoView({
      behavior: "smooth"
    });

  }, 100);

}

function checkYTApiReady(){

  if(window.YT && window.YT.Player){

    appStates.loop.playerReady = true;
    appStates.focus.playerReady = true;

  }
  else{
    setTimeout(checkYTApiReady, 200);
  }

}

window.onYouTubeIframeAPIReady = function(){

  appStates.loop.playerReady = true;
  appStates.focus.playerReady = true;

};

function toggleTimerPosition(mode){

  const state = appStates[mode];

  state.positionIndex =
    (state.positionIndex + 1) % positions.length;

  const timerDisplay =
    getEl(mode, "timerDisplay");

  timerDisplay.className =
    `timer-display ${positions[state.positionIndex]}`;

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    circle.className = "circular-timer";

    if(positions[state.positionIndex] !== "center"){
      circle.classList.add(
        positions[state.positionIndex]
      );
    }

  }

  const labels =
    currentLang === 'jp'
    ? ["左上","右上","左下","右下","中央"]
    : ["Top-Left","Top-Right","Bottom-Left","Bottom-Right","Center"];

  document.getElementById(`${mode}_positionBtn`)
  .textContent =
    (currentLang === 'jp'
      ? "表示位置："
      : "Position: ")
      + labels[state.positionIndex];
}

function toggleTimerType(mode){

  const state = appStates[mode];

  state.isCircular =
    !state.isCircular;

  const btn =
    document.getElementById(`${mode}_timerTypeBtn`);

  btn.textContent =
    state.isCircular
      ? (currentLang === 'jp'
        ? "体感タイマー"
        : "Progress Circle")
      : (currentLang === 'jp'
        ? "シンプルタイマー"
        : "Simple Timer");

  const numeric =
    getEl(mode, "timerDisplay");

  let circle =
    document.getElementById(`${mode}_circularTimer`);

  if(state.isCircular){

    numeric.style.display = "none";

    if(!circle){

      createCircularTimer(mode);

      circle =
        document.getElementById(`${mode}_circularTimer`);

    }

    circle.style.display = "flex";

    adjustTimerSizes(mode);

    updateTimerDisplay(mode);

  }
  else{

    if(circle){
      circle.style.display = "none";
    }

    numeric.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }

}

function createCircularTimer(mode){

  const wrapper =
    getEl(mode, "ytPlayer").parentElement;

  const div =
    document.createElement("div");

  div.id =
    `${mode}_circularTimer`;

  div.className =
    "circular-timer";

  div.innerHTML = `

    <svg viewBox="0 0 200 200">

      <circle
        class="bg"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <circle
        class="progress"
        cx="100"
        cy="100"
        r="90"
        stroke-width="15">
      </circle>

      <text
        id="${mode}_circularTimerText"
        x="100"
        y="100"
        text-anchor="middle"
        dominant-baseline="middle"
        fill="white"
        font-size="42"
        transform="rotate(90 100 100)"
        style="text-shadow: 0 0 8px black;">
        00:00
      </text>
      <text
        id="${mode}_phaseText"
        x="100"
        y="132"
        text-anchor="middle"
        fill="#bfe9ff"
        font-size="18"
        transform="rotate(90 100 100)"
        style="
          text-shadow:
            0 0 6px rgba(0,0,0,0.7),
            0 0 10px rgba(120,200,255,0.5);
          opacity:0;
        ">
        BREAK
      </text>

    </svg>

  `;

wrapper.appendChild(div);

if(positions[appStates[mode].positionIndex] !== "center"){
  div.classList.add(
    positions[appStates[mode].positionIndex]
  );
}

  const progress =
    div.querySelector(".progress");

  const r =
    parseFloat(progress.getAttribute("r"));

  const circ =
    2 * Math.PI * r;

  progress.style.strokeDasharray = circ;
  progress.style.strokeDashoffset = circ;

  div.dataset.circumference = circ;

}

function adjustTimerSizes(mode){

  const wrapper =
    getEl(mode, "ytPlayer")
    .parentElement;

  const rect =
    wrapper.getBoundingClientRect();

  const h = rect.height;

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    const size = Math.min(rect.width, rect.height) * 0.75;

    circle.style.width =
      size + "px";

    circle.style.height =
      size + "px";

    const txt =
      document.getElementById(`${mode}_circularTimerText`);

    if(txt){

      txt.setAttribute(
        "font-size",
        Math.round(size * 0.14)
      );

    }
  }

  const timer =
    getEl(mode, "timerDisplay");

  if(timer){

    const fontPx =
      Math.round(h * 0.12);

    timer.style.fontSize =
      Math.max(
        12,
        Math.min(fontPx, 0.25 * rect.width)
      ) + "px";

  }

}

function updateTimerDisplay(mode){

  const state =
    appStates[mode];

  const mins =
    String(Math.floor(state.remainingTime / 60))
    .padStart(2, '0');

  const secs =
    String(state.remainingTime % 60)
    .padStart(2, '0');

  const timerDisplay =
    getEl(mode, "timerDisplay");

  timerDisplay.textContent =
    `${mins}:${secs}`;

  if(!state.isCircular){

    timerDisplay.style.display =
      state.remainingTime > 0
      ? "block"
      : "none";

  }

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){

    const text =
      document.getElementById(`${mode}_circularTimerText`);

    text.textContent =
      `${mins}:${secs}`;
    const progress =
      circle.querySelector(".progress");

    // focusの休憩時間だけ青にする
    if(mode === "focus" && state.currentPhase === "break"){
      progress.style.stroke = "#4da6ff";
    }
    else{
      progress.style.stroke = "#ff0000";
    }

    const total =
      mode === "focus"
      ? (
          state.currentPhase === "break"
          ? state.breakDuration
          : state.focusDuration
        )
      : state.loopDuration;
 /*     
//      : parseInt(getEl(mode, "duration").value, 10) * 60;
        :parseInt(
        getEl(mode, "duration").dataset.value,
        10
      ) * 60
*/
    const circ =
      parseFloat(circle.dataset.circumference);

    const fraction =
      (total - state.remainingTime) / total;

    progress.style.strokeDashoffset =
      Math.max(0, circ * (1 - fraction));
  }

}

function loadVideo(mode){

  const state =
    appStates[mode];

  clearInterval(state.timerInterval);

    state.isPlaying = false;
    state.isPaused = false;

    if(state.ytPlayer){
      state.ytPlayer.pauseVideo();
    }


  const url =
    getEl(mode, "ytUrl").value;

  const videoId =
    url.match(/(?:youtu\.be\/|v=)([a-zA-Z0-9_-]+)/)?.[1];

  if(!videoId){

    alert(
      currentLang === 'jp'
      ? "正しいURLを入力してください。"
      : "Please enter a valid URL."
    );

    return;

  }

  const duration =
//  parseInt(getEl(mode, "duration").value, 10);
    parseInt(
      getEl(mode, "duration").dataset.value,
      10
    )
  if(!duration || duration <= 0){

    alert(
      currentLang === 'jp'
      ? "タイマーには1分以上の整数を入力してください。"
      : "Please enter a valid duration."
    );

    return;

  }

  state.remainingTime =
    duration * 60;

  if(mode === "loop"){
    state.loopDuration =
      duration * 60;
  }

  if(mode === "focus"){

    state.pomodoroMode = true;

    state.currentPhase = "focus";

    state.focusDuration =
      duration * 60;

//    state.breakDuration =
//      (parseInt(getEl(mode, "breakDuration").value, 10) || 5) * 60;
    state.breakDuration =
      (
        parseInt(
          getEl(mode, "breakDuration").dataset.value,
          10
        ) || 5
      ) * 60;
    state.remainingTime =
      state.focusDuration;

    const circle =
      document.querySelector(`#${mode}_circularTimer .progress`);

    if(circle){
      circle.style.stroke = "#ff0000";
    }
  }

  updateTimerDisplay(mode);

  adjustTimerSizes(mode);

  if(!state.ytPlayer && state.playerReady){

    state.ytPlayer =
      new YT.Player(`${mode}_ytPlayer`, {

        videoId,

        playerVars: {
          playsinline: 1,
          fs: 0
        },

        events: {

          onReady: event => {

            event.target.cueVideoById(videoId);

            setTimeout(() => {
              adjustTimerSizes(mode);
            }, 300);

          },

          onStateChange: evt => {

            if(evt.data === YT.PlayerState.ENDED){

              setTimeout(() => {

                state.ytPlayer.seekTo(0, true);
                state.ytPlayer.playVideo();

              }, 300);

            }

          }

        }

      });

  }
  else if(state.ytPlayer){

    state.ytPlayer.cueVideoById(videoId);

  }

}

function playLoop(mode){

  const state =
    appStates[mode];

  if(!state.ytPlayer || state.isPlaying){
    return;
  }

  state.ytPlayer.unMute();

  state.ytPlayer.playVideo();

  state.isPlaying = true;

  clearInterval(state.timerInterval);

  state.timerInterval =
    setInterval(() => {

      state.remainingTime--;

      updateTimerDisplay(mode);

      if(state.remainingTime <= 0){

        if(mode === "focus"){

          if(state.currentPhase === "focus"){

            state.currentPhase = "break";

            state.remainingTime =
              state.breakDuration;

            state.ytPlayer.pauseVideo();

          }
          else{

            state.currentPhase = "focus";

            state.remainingTime =
              state.focusDuration;

            state.ytPlayer.playVideo();

          }

          updateTimerDisplay(mode);

          return;

        }

        clearInterval(state.timerInterval);

        state.ytPlayer.stopVideo();

        state.isPlaying = false;

      }

    }, 1000);

}

function stopLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.pauseVideo();

  clearInterval(state.timerInterval);

  state.isPlaying = false;

}

function resetLoop(mode){

  const state =
    appStates[mode];

  state.ytPlayer?.destroy();

  state.ytPlayer = null;

  clearInterval(state.timerInterval);

  state.remainingTime = 0;
  state.isPlaying = false;
  state.isPaused = false;

  getEl(mode, "ytUrl").value = "";

  const timer =
    getEl(mode, "timerDisplay");

  timer.textContent = "";
  timer.style.display = "none";

  getEl(mode, "ytPlayer").innerHTML = "";

  const circle =
    document.getElementById(`${mode}_circularTimer`);

  if(circle){
    circle.style.display = "none";
    circle.remove();
  }

}

function extractVideoId(url){

  const match =
    url.match(/(?:youtu\.be\/|youtube\.com.*(?:v=|\/embed\/))([a-zA-Z0-9_-]+)/);

  return match ? match[1] : null;

}

function createWheelPicker(id, min, max, defaultValue){

  const wheel =
    document.getElementById(id);

  wheel.innerHTML = "";

  for(let i=min; i<=max; i++){

    const item =
      document.createElement("div");

    item.className = "wheel-item";

    item.dataset.value = i;

    item.textContent = i;

    wheel.appendChild(item);

  }

  const saved =
    localStorage.getItem(id);

  let currentValue =
    parseInt(saved || defaultValue, 10);

  function setActive(value){

    wheel.dataset.value = value;

    localStorage.setItem(id, value);

    wheel.querySelectorAll(".wheel-item")
    .forEach(item => {

      item.classList.toggle(
        "active",
        parseInt(item.dataset.value, 10) === value
      );

    });

  }

  function scrollToValue(value){

    const target =
      [...wheel.children]
      .find(el =>
        parseInt(el.dataset.value, 10) === value
      );

    if(!target) return;

    const targetTop =
      target.offsetTop
      - (wheel.clientHeight / 2)
      + (target.clientHeight / 2);

    wheel.scrollTop = targetTop;
  }

  setTimeout(() => {

    scrollToValue(currentValue);

    setActive(currentValue);

  }, 50);

  let ticking = false;

  wheel.addEventListener("scroll", () => {

    if(ticking) return;

    ticking = true;

    requestAnimationFrame(() => {

      const wheelRect =
        wheel.getBoundingClientRect();

      const wheelCenter =
        wheelRect.top + wheelRect.height / 2;

      let closest = null;
      let closestDist = Infinity;

      wheel.querySelectorAll(".wheel-item")
      .forEach(item => {

        const rect =
          item.getBoundingClientRect();

        const itemCenter =
          rect.top + rect.height / 2;

        const dist =
          Math.abs(wheelCenter - itemCenter);

        if(dist < closestDist){

          closestDist = dist;
          closest = item;

        }

      });

      if(closest){

        setActive(
          parseInt(closest.dataset.value, 10)
        );

      }

      ticking = false;

    });

  });

}
function scrollCarousel(mode, direction){

  carousel.scrollBy({

function createVideoList(mode){

  const area =
    document.getElementById(`${mode}_videoList`);

  area.innerHTML = "";

  presetVideos.forEach(video => {

    const id =
      extractVideoId(video.url);

    const card =
      document.createElement("div");

    card.className = "video-card";

    card.innerHTML = `

      <img
        src="https://img.youtube.com/vi/${id}/hqdefault.jpg">

      </div>

    `;
    card.onclick = () => {

      area.querySelectorAll(".video-card")
      .forEach(c =>
        c.classList.remove("active")
      );

      card.classList.add("active");

      getEl(mode, "ytUrl").value =
        video.url;

      localStorage.setItem(
        `${mode}_selectedVideo`,
        video.url
      );

      loadVideo(mode);

      document.querySelector(`#${mode} .video-wrapper`)
      ?.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

    };

    area.appendChild(card);

  });

}

function restoreSavedSettings(){

  const loopDuration =
    localStorage.getItem("loop_duration");

  const focusDuration =
    localStorage.getItem("focus_duration");

  const breakDuration =
    localStorage.getItem("focus_breakDuration");

  if(loopDuration){
    document.getElementById("loop_duration").dataset.value = 
    loopDuration;
  }

  if(focusDuration){
    document.getElementById("focus_duration").value =
      focusDuration;
  }

  if(breakDuration){
    document.getElementById("focus_breakDuration").value =
      breakDuration;
  }

  const loopVideo =
    localStorage.getItem("loop_selectedVideo");

  const focusVideo =
    localStorage.getItem("focus_selectedVideo");

  if(loopVideo){
    getEl("loop", "ytUrl").value =
      loopVideo;
  }

  if(focusVideo){
    getEl("focus", "ytUrl").value =
      focusVideo;
  }

}
document.querySelectorAll(".video-select-grid")
.forEach(carousel => {

  let isDown = false;
  let startX;
  let scrollLeft;

  carousel.addEventListener("mousedown", e => {

    isDown = true;

    carousel.classList.add("dragging");

    startX =
      e.pageX - carousel.offsetLeft;

    scrollLeft =
      carousel.scrollLeft;

  });

  carousel.addEventListener("mouseleave", () => {

    isDown = false;

    carousel.classList.remove("dragging");

  });

  carousel.addEventListener("mouseup", () => {

    isDown = false;

    carousel.classList.remove("dragging");

  });

  carousel.addEventListener("mousemove", e => {

    if(!isDown) return;

    e.preventDefault();

    const x =
      e.pageX - carousel.offsetLeft;

    const walk =
      (x - startX) * 1.5;

    carousel.scrollLeft =
      scrollLeft - walk;

  });

});
